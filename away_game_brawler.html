    // Dashed yellow center line + solid white lane edges for one road segment.
    // axis:'x' -> road runs along world x (horizontal); axis:'z' -> along world z.
    // localPos is the road's centerline coordinate (the OTHER axis), length is segment length.
    function buildRoadMarkings(axis, localPos, length, width){
        const g=new THREE.Group();
        const yellow=new THREE.MeshBasicMaterial({color:0xf2c14e});
        const white =new THREE.MeshBasicMaterial({color:0xf5f1e6});
        const halfW=width/2;
        // dashed centerline — longer dashes, longer gaps (fewer meshes)
        const dash=2.4, gap=2.6;
        for(let s=-length/2+dash/2; s<length/2; s+=dash+gap){
            const m=new THREE.Mesh(
                axis==='x' ? new THREE.BoxGeometry(dash,0.04,0.22) : new THREE.BoxGeometry(0.22,0.04,dash),
                yellow);
            if(axis==='x') m.position.set(s,0.02,localPos);
            else           m.position.set(localPos,0.02,s);
            g.add(m);
        }
        // solid edge lines (white) at lane edges
        for(const off of [-halfW+0.4, halfW-0.4]){
            const m=new THREE.Mesh(
                axis==='x' ? new THREE.BoxGeometry(length,0.04,0.16) : new THREE.BoxGeometry(0.16,0.04,length),
                white);
            if(axis==='x') m.position.set(0,0.02,localPos+off);
            else           m.position.set(localPos+off,0.02,0);
            g.add(m);
        }
        return g;
    }

    function buildCrosswalk(cx,cz,axis,length){
        // Zebra crossing — white stripes across the road, perpendicular to traffic.
        // `length` is how far the stripe extends across the road.
        const g=new THREE.Group();
        const white=new THREE.MeshBasicMaterial({color:0xf5f1e6});
        const L = length || 20;
        const stripes=8, stripeW=0.5, gap=0.42;
        const span = stripes*stripeW + (stripes-1)*gap;
        for(let i=0;i<stripes;i++){
            const t=-span/2 + i*(stripeW+gap) + stripeW/2;
            const m=new THREE.Mesh(
                axis==='x' ? new THREE.BoxGeometry(stripeW,0.05,L)
                           : new THREE.BoxGeometry(L,0.05,stripeW),
                white);
            if(axis==='x') m.position.set(cx+t,0.025,cz);
            else           m.position.set(cx,0.025,cz+t);
            g.add(m);
        }
        return g;
    }

    function createBuilding(w,h,d,type, opts={}){
        const g=new THREE.Group();
        let mat;
        if(type==='brick'){ const t=TEX_BRICK.clone(); t.needsUpdate=true; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(Math.max(1,Math.round(w/6)),Math.max(1,Math.round(h/6))); mat=new THREE.MeshToonMaterial({map:t}); }
        else if(type==='concrete'){ const t=TEX_CONCRETE.clone(); t.needsUpdate=true; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(Math.max(1,Math.round(w/8)),Math.max(1,Math.round(h/8))); mat=new THREE.MeshToonMaterial({map:t}); }
        else if(type==='teal'){ mat=toon(COLORS.teal); }
        else if(type==='mustard'){ mat=toon(COLORS.mustard); }
        else { mat=toon(COLORS.plum); }

        const base=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
        base.position.y=h/2; base.castShadow=true; base.receiveShadow=true; addOutline(base); g.add(base);

        // shared materials for windows / door / trim
        const litWin   = toon(COLORS.windowLit,{emissive:0xffd09a, emissiveIntensity:0.35});
        const darkWin  = toon(COLORS.window,   {emissive:0x223344, emissiveIntensity:0.20});
        const windowFrameMat = toon(0x2a1f17);    // dark frame around panes
        const doorMat        = toon(0x5a3a22);    // wood door
        const doorTrimMat    = toon(0xffd24a);    // gold/yellow door trim
        const stoopMat       = toon(0xa39782);    // concrete stoop
        const sillMat        = toon(0xe2d8c2);    // window sill stone

        // Adds a column×row grid of windows on one of the building's 4 vertical faces.
        // face is one of: '+z','-z','+x','-x'. Windows are inset 0.06 from the wall.
        function addWindowsToFace(face){
            const along  = (face==='+z'||face==='-z') ? w : d;     // wall span
            const normSign = (face==='+z'||face==='+x') ? 1 : -1;  // outward direction
            const cols=Math.max(1,Math.floor(along/3));
            const rowsW=Math.max(1,Math.floor(h/3.2));
            const winGeo=new THREE.PlaneGeometry(1.05,1.45);
            const sillGeo=new THREE.BoxGeometry(1.35,0.14,0.18);
            for(let c=0;c<cols;c++) for(let r=0;r<rowsW;r++){
                if(Math.random()<.18) continue;     // some windows blank/dark wall
                // ground floor on the street side is reserved for storefront / door
                if(r===0 && face===opts.frontFace) continue;
                const useLit = Math.random()<.55;
                const winMat = useLit ? litWin.clone() : darkWin.clone();
                // small variance in tint so the building doesn't read uniform
                if(useLit) winMat.color.offsetHSL(0,0, (Math.random()-.5)*0.12);
                const a = -along/2 + 1.6 + c*(along/cols)*.95;
                const y = 1.9 + r*(h/rowsW)*0.88;
                // frame (slightly larger dark box behind the glass plane)
                const frame=new THREE.Mesh(new THREE.PlaneGeometry(1.25,1.65), windowFrameMat);
                // glass
                const win=new THREE.Mesh(winGeo, winMat);
                // muntin (cross bar) — small lit ridges on the pane
                const muntinH=new THREE.Mesh(new THREE.PlaneGeometry(1.05,0.08), windowFrameMat);
                const muntinV=new THREE.Mesh(new THREE.PlaneGeometry(0.08,1.45), windowFrameMat);
                // sill (sticking out)
                const sill=new THREE.Mesh(sillGeo, sillMat);
                // place all on the requested face
                if(face==='+z'||face==='-z'){
                    const z = normSign*(d/2 + 0.06);
                    frame.position.set(a,y,z);
                    win.position.set(a,y,z + normSign*0.005);
                    muntinH.position.set(a,y,z + normSign*0.012);
                    muntinV.position.set(a,y,z + normSign*0.012);
                    sill.position.set(a, y-0.78, z + normSign*0.05);
                    if(face==='-z'){ frame.rotation.y=Math.PI; win.rotation.y=Math.PI; muntinH.rotation.y=Math.PI; muntinV.rotation.y=Math.PI; }
                } else {
                    const x = normSign*(w/2 + 0.06);
                    frame.position.set(x,y,a);
                    win.position.set(x + normSign*0.005, y, a);
                    muntinH.position.set(x + normSign*0.012, y, a);
                    muntinV.position.set(x + normSign*0.012, y, a);
                    sill.position.set(x + normSign*0.05, y-0.78, a);
                    frame.rotation.y = normSign>0 ? Math.PI/2 : -Math.PI/2;
                    win.rotation.y   = normSign>0 ? Math.PI/2 : -Math.PI/2;
                    muntinH.rotation.y = frame.rotation.y;
                    muntinV.rotation.y = frame.rotation.y;
                }
                g.add(frame); g.add(win); g.add(muntinH); g.add(muntinV); g.add(sill);
            }
        }

        // Adds an entryway: stoop + frame + door slab + handle + transom + house number.
        function addDoor(face){
            const along  = (face==='+z'||face==='-z') ? w : d;
            const normSign = (face==='+z'||face==='+x') ? 1 : -1;
            // pick a horizontal offset along the wall — pull the door toward the center
            const a = (Math.random()-0.5) * Math.max(0, along*0.4);
            const stoopH=0.35, doorH=2.4, doorW=1.25;

            // stoop in front of door
            const stoop=new THREE.Mesh(new THREE.BoxGeometry(doorW+1.4,stoopH,1.4), stoopMat);
            // frame (recessed dark slab behind door)
            const frame=new THREE.Mesh(new THREE.BoxGeometry(doorW+0.4, doorH+0.5, 0.12), doorTrimMat);
            // door slab
            const door=new THREE.Mesh(new THREE.BoxGeometry(doorW,doorH,0.1), doorMat);
            // door panel inserts (two stacked rectangles for that paneled-door look)
            const panelMat = toon(0x3e2615);
            const panelTop = new THREE.Mesh(new THREE.PlaneGeometry(doorW*0.7, doorH*0.32), panelMat);
            const panelBot = new THREE.Mesh(new THREE.PlaneGeometry(doorW*0.7, doorH*0.32), panelMat);
            // door handle
            const handle=new THREE.Mesh(new THREE.SphereGeometry(0.07,8,6), toon(0xffd24a));
            // transom window over the door (lit at night)
            const transomGeo=new THREE.PlaneGeometry(doorW,0.45);
            const transom=new THREE.Mesh(transomGeo, litWin.clone());
            // tiny house number plate
            const num=new THREE.Mesh(new THREE.PlaneGeometry(0.45,0.3), toon(0xfff8e1));
            num.material.transparent=false;

            // Now place all of those on the requested face.
            if(face==='+z'||face==='-z'){
                const z = normSign*(d/2 + 0.06);
                stoop.position.set(a, stoopH/2, z + normSign*0.7);
                frame.position.set(a, stoopH + (doorH+0.5)/2, z + normSign*0.02);
                door.position.set( a, stoopH + doorH/2,        z + normSign*0.10);
                panelTop.position.set(a, stoopH + doorH*0.72,  z + normSign*0.16);
                panelBot.position.set(a, stoopH + doorH*0.32,  z + normSign*0.16);
                handle.position.set(  a + doorW*0.38, stoopH + doorH*0.5, z + normSign*0.18);
                transom.position.set( a, stoopH + doorH + 0.30, z + normSign*0.12);
                num.position.set(     a, stoopH + doorH + 0.78, z + normSign*0.12);
                if(face==='-z'){
                    [frame,door,panelTop,panelBot,handle,transom,num].forEach(m=>{ m.rotation.y=Math.PI; });
                }
            } else {
                const x = normSign*(w/2 + 0.06);
                stoop.position.set(x + normSign*0.7, stoopH/2, a);
                frame.position.set(x + normSign*0.02, stoopH + (doorH+0.5)/2, a);
                door.position.set( x + normSign*0.10, stoopH + doorH/2, a);
                panelTop.position.set(x + normSign*0.16, stoopH + doorH*0.72, a);
                panelBot.position.set(x + normSign*0.16, stoopH + doorH*0.32, a);
                handle.position.set(  x + normSign*0.18, stoopH + doorH*0.5, a + doorW*0.38);
                transom.position.set( x + normSign*0.12, stoopH + doorH + 0.30, a);
                num.position.set(     x + normSign*0.12, stoopH + doorH + 0.78, a);
                const ry = normSign>0 ? Math.PI/2 : -Math.PI/2;
                [frame,door,panelTop,panelBot,handle,transom,num,stoop].forEach(m=>{ m.rotation.y=ry; });
            }
            // outline only the larger volumes — finer details stay clean
            addOutline(stoop); addOutline(frame); addOutline(door);
            stoop.castShadow=true; stoop.receiveShadow=true;
            door.castShadow=true;
            g.add(stoop); g.add(frame); g.add(door); g.add(panelTop); g.add(panelBot); g.add(handle); g.add(transom); g.add(num);
        }

        // Decide which face is the street/front. Caller passes opts.frontFace; if not
        // given we fall back to +z (matches the old default).
        const front = opts.frontFace || '+z';

        // Windows on every face that's wide/tall enough.
        addWindowsToFace('+z');
        addWindowsToFace('-z');
        if(w>=8) { addWindowsToFace('+x'); addWindowsToFace('-x'); }

        // One door on the front (street-facing) side.
        addDoor(front);

        // roof cap
        const roofCol=[COLORS.roofRed,COLORS.roofTeal,COLORS.mustard][Math.floor(Math.random()*3)];
        const roof=new THREE.Mesh(new THREE.BoxGeometry(w+.6,1.2,d+.6),toon(roofCol));
        roof.position.y=h+.6; roof.castShadow=true; addOutline(roof); g.add(roof);
        g.userData.isBuilding = true;
        g.userData.baseMesh = base;
        return g;
    }
    // ============================================================
    //  SPRITE CHARACTER
    //  A camera-facing billboard that selects the correct of 8
    //  directional rows + animation columns from its atlas.
    // ============================================================
    const SPRITE_SCALE = 4.4;       // world height of a sprite
    const SPRITE_W = SPRITE_SCALE * (CELL/CELL); // square cells

    class Character {
        constructor(x,z,opts){
            this.team   = opts.team;          // 'player' | 'enemy'
            this.atlas  = opts.atlas;         // TEX key
            this.anims  = opts.anims;         // ENEMY_ANIMS | HERO_ANIMS
            this.hp = this.maxHp = opts.hp||100;
            this.speed  = opts.speed||6;
            this.dmg    = opts.dmg||14;
            this.reach  = opts.reach||3.4;
            this.weapon = opts.weapon||'fist';// hero: 'belt'|'broom'
            this.state  = 'alive';            // 'alive'|'dead'
            this.facing = 0;                  // world heading (radians), 0=+Z (south on screen)
            this.attackCooldown = 0;
            this.hitDelivered = false;
            this.target = null;
            this.aggroDelay = 0.3 + Math.random()*0.8;
            // new combat fields
            this.invuln = 0;             // i-frames
            this.dodgeCool = 0;
            this.dodgeVel = null;        // active dodge velocity (Vector3) while > 0
            this.dodgeTime = 0;
            this.blocking = false;
            this.blockStart = 0;         // time blocking has been held (for parry window)
            this.stunTimer = 0;          // when >0, can't act
            this.kbVel = null;           // active knockback velocity
            this.kbTime = 0;
            this.comboHits = 0;          // hits landed in current combo
            this.comboTimer = 0;         // time left in combo window
            this.lastAttackKind = 'light';
            this.throwCooldown = 0;
            this.attackLungeVel = null;
            this.attackLungeTime = 0;

            // animation
            this.anim = 'idle';
            this.frame = 0;
            this.frameTime = 0;
            this.locked = false;              // playing a non-loop anim

            // material/mesh — one cloned texture instance so UVs are per-entity
            const src = TEX[this.atlas];
            this.cols = src.cols;
            // per-atlas row count — new AI sheets are 4×6 (6 facings), originals are 4×8
            this.rows = src.rows || ROWS;
            this.tex = src.texture.clone();
            this.tex.needsUpdate = true;
            // shrink repeat by 1 texel so neighboring atlas cells can't bleed in at edges
            this.tex.repeat.set(1/this.cols - 1/(this.cols*CELL), 1/this.rows - 1/(this.rows*CELL));
            this.mat = new THREE.MeshBasicMaterial({
                map:this.tex, transparent:true, alphaTest:0.5,
                side:THREE.DoubleSide, depthWrite:true,
            });
            const geo = new THREE.PlaneGeometry(SPRITE_SCALE, SPRITE_SCALE);
            this.sprite = new THREE.Mesh(geo, this.mat);
            this.sprite.castShadow = false;
            this.sprite.renderOrder = 2;

            // WHITE SILHOUETTE BACKING — same texture clone, tinted pure white,
            // scaled a touch larger and pushed slightly behind so any see-through
            // gaps in the sprite read as a clean white outline instead of the world.
            this.silTex = src.texture.clone();
            this.silTex.needsUpdate = true;
            this.silTex.repeat.set(1/this.cols - 1/(this.cols*CELL), 1/this.rows - 1/(this.rows*CELL));
            this.silMat = new THREE.MeshBasicMaterial({
                map:this.silTex, transparent:true, alphaTest:0.4,
                side:THREE.DoubleSide, depthWrite:false, color:0xffffff,
            });
            this.silhouette = new THREE.Mesh(geo.clone(), this.silMat);
            this.silhouette.scale.set(1.06, 1.06, 1.06);
            this.silhouette.position.z = -0.04;
            this.silhouette.renderOrder = 1;
            this.sprite.add(this.silhouette);

            // Per-entity sprite size multiplier (captains override _baseSpriteMul).
            // All animation cells share one figure scale, so this stays constant
            // through attacks — see the scale lerp in the game loop.
            this._baseSpriteMul = 1.0;
            this._curSpriteMul  = 1.0;

            this.mesh = new THREE.Group();           // logical position holder
            this.mesh.position.set(x,0,z);
            this.sprite.position.y = SPRITE_SCALE/2;  // feet on ground
            this.mesh.add(this.sprite);

            // soft contact shadow blob
            const sh = new THREE.Mesh(
                new THREE.CircleGeometry(1.1, 16),
                new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.28})
            );
            sh.rotation.x = -Math.PI/2; sh.position.y = 0.05;
            this.shadowBlob = sh; this.mesh.add(sh);

            scene.add(this.mesh);
            STATE.entities.push(this);
            this.setUV();
        }

        // map facing + camera angle to one of 8 sprite rows.
        // Camera orbits at angle a: it sits at player+(cos a, , sin a)*D looking inward.
        // Player heading h has forward = (sin h, 0, cos h).  Projecting that forward
        // into the camera's screen frame gives a screen angle phi (0 = facing the
        // viewer/South, increasing clockwise toward screen-East). Sheet rows run
        // clockwise from South, so row = round(phi / 45deg).
        dirRow(){
            const s = this.facing + STATE.cameraAngle;
            let phi = Math.atan2(-Math.cos(s), Math.sin(s));
            phi = ((phi % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
            // generic N-way mapping: 8-row originals AND 6-row new sheets
            return Math.round(phi / (Math.PI*2 / this.rows)) % this.rows;
        }

        setUV(){
            const a = this.anims[this.anim];
            const col = a.col + Math.min(this.frame, a.len-1);
            const row = this.dirRow();
            // half-texel inset so NearestFilter can't grab a pixel from the adjacent cell
            const ox = col / this.cols + 0.5/(this.cols*CELL);
            const oy = 1 - (row+1)/this.rows + 0.5/(this.rows*CELL); // textures are top-origin; row 0 at top
            this.tex.offset.x = ox;  this.tex.offset.y = oy;
            this.silTex.offset.x = ox; this.silTex.offset.y = oy;
        }

        play(name, {force=false}={}){
            if(this.anim===name && !force) return;
            if(this.locked && !force) return;
            this.anim=name; this.frame=0; this.frameTime=0;
            const a=this.anims[name];
            this.locked = !a.loop;
            this.setUV();
        }

        animate(dt){
            const a=this.anims[this.anim];
            // dead bodies hold the final death frame
            if(this.state==='dead' && this.anim==='death' && this.frame>=a.len-1){
                this.frame=a.len-1; this.setUV(); return;
            }
            this.frameTime += dt;
            const spf = 1/a.fps;
            while(this.frameTime>=spf){
                this.frameTime-=spf;
                this.frame++;
                if(this.frame>=a.len){
                    if(a.loop){ this.frame=0; }
                    else {
                        this.frame=a.len-1;
                        this.locked=false;
                        if(this.anim==='death'){ break; }       // hold last frame
                        this.anim='idle'; this.frame=0;         // return to idle after one-shot
                    }
                }
            }
            this.setUV();
        }

        faceTo(tx,tz){
            const dx=tx-this.mesh.position.x, dz=tz-this.mesh.position.z;
            if(dx*dx+dz*dz>0.0001) this.facing=Math.atan2(dx,dz);
        }

        takeDamage(amount, fromDir, info){
            if(this.state!=='alive') return;
            // dev god mode: player takes no damage
            if(this===STATE.player && STATE.devGod) return;
            // dodge i-frames
            if(this.invuln>0) return;
            // block / parry
            if(this.blocking){
                const parryWindow = this.blockStart < 0.18;
                if(parryWindow){
                    // PERFECT PARRY: zero damage, stagger attacker, big special gain
                    if(info && info.attacker && info.attacker.state==='alive'){
                        info.attacker.stunTimer = Math.max(info.attacker.stunTimer, 1.0);
                        info.attacker.attackCooldown = Math.max(info.attacker.attackCooldown, 0.6);
                    }
                    spawnDamageNumber(this.mesh.position.x, SPRITE_SCALE*0.6, this.mesh.position.z, 'PARRY!', 'crit');
                    if(this===STATE.player){ gainSpecial(28); }
                    triggerHitStop(0.12); triggerShake(0.6,0.18);
                    playSfx('parry');
                    return;
                } else {
                    // chip damage and knockback drastically reduced
                    amount = Math.max(1, Math.round(amount * 0.25));
                    spawnDamageNumber(this.mesh.position.x, SPRITE_SCALE*0.6, this.mesh.position.z, amount, 'normal');
                    if(this===STATE.player) gainSpecial(4);
                    playSfx('block');
                    this.hp-=amount;
                    if(this===STATE.player) updateHealthUI();
                    if(this.hp<=0){ this.die(); }
                    return;
                }
            }
            this.hp-=amount;
            // Hit flash — longer, more readable strobe (bright pink/white pulse)
            this.mat.color.setHex(0xffd6d6);
            this.silMat.color.setHex(0xffffff);
            if(this._flashT) clearTimeout(this._flashT);
            this._flashT = setTimeout(()=>{
                if(this.mat && this.state==='alive'){
                    this.mat.color.setHex(0xffffff);
                    if(this._restoreTint) this._restoreTint();
                }
            }, 220);
            // Hit-pause: enemies (and allies) freeze briefly so the strike reads as a real impact.
            if(this.team!=='player'){
                this.stunTimer = Math.max(this.stunTimer, 0.28);
                // also break out of any current attack windup
                if(this.locked && (this.anim==='attack'||this.anim==='belt'||this.anim==='broom')){
                    this.locked=false; this._pendingHit=null; this.attackCooldown = Math.max(this.attackCooldown, 0.35);
                }
                if(!this.locked) this.play('hurt',{force:true});
            }
            // damage number
            spawnDamageNumber(this.mesh.position.x, SPRITE_SCALE*0.6, this.mesh.position.z, amount, (info&&info.flavor)||'normal');
            if(fromDir){
                const kbStrength = (info&&info.kb) ? info.kb : 1.2;
                // knockback velocity for chain physics (instead of instant teleport)
                this.kbVel = new THREE.Vector3(fromDir.x*kbStrength*8, 0, fromDir.z*kbStrength*8);
                this.kbTime = 0.22 + kbStrength*0.04;
                const nx=this.mesh.position.x+fromDir.x*1.2;
                const nz=this.mesh.position.z+fromDir.z*1.2;
                if(!checkCollision(nx,this.mesh.position.z,0.6)) this.mesh.position.x=nx;
                if(!checkCollision(this.mesh.position.x,nz,0.6)) this.mesh.position.z=nz;
            }
            if(this.hp<=0){ this.die(); }
            else if(!this.locked){ this.play('hurt'); }
            if(this===STATE.player) updateHealthUI();
        }

        attack(kind){
            // kind: 'light' | 'heavy'   (finisher is derived from 3-hit combo on player)
            if(this.attackCooldown>0 || this.state!=='alive' || this.locked || this.blocking || this.stunTimer>0 || this.dodgeTime>0) return;
            kind = kind || 'light';
            // 3rd consecutive light hit lands as a finisher (player only)
            let resolveKind = kind;
            const lightStage = (this===STATE.player && kind==='light') ? (this.comboHits%3) : 0;
            if(this===STATE.player && kind==='light' && this.comboHits>=2 && this.comboTimer>0){
                resolveKind = 'finisher';
            }
            let conf;
            if(resolveKind==='heavy'){
                conf = { cd: this===STATE.player?0.95:1.25, dmgMul:1.75, reachAdd:1.0, kbMul:2.7, big:true, anim:'preferred', wind:0.55,
                         move:'uppercut', arc:1.35, lunge:7.5, launchY:9.5, launchForward:8.5 };
            } else if(resolveKind==='finisher'){
                conf = { cd:0.85, dmgMul:2.25, reachAdd:1.35, kbMul:4.1, big:true, finisher:true, arc:Math.PI, wind:0.4,
                         move:'spin', lunge:6.0, launchY:7.5, launchForward:12.0 };
            } else if(this===STATE.player){
                const chain = [
                    { cd:0.34, dmgMul:0.85, reachAdd:0.1, kbMul:0.85, big:false, wind:0.32, move:'jab',   arc:0.82, lunge:4.5 },
                    { cd:0.38, dmgMul:1.05, reachAdd:0.45,kbMul:1.15, big:false, wind:0.36, move:'hook',  arc:1.35, lunge:5.4 },
                    { cd:0.46, dmgMul:1.25, reachAdd:0.85,kbMul:1.55, big:true,  wind:0.38, move:'sweep', arc:2.45, lunge:6.2 }
                ];
                conf = chain[lightStage];
            } else {
                conf = { cd:1.0, dmgMul:1.0, reachAdd:0, kbMul:1.0, big:false, wind:0.4, move:'jab' };
            }
            const atkSpeedMul = (this===STATE.player) ? STATE.stats.atkSpeed : 1.0;
            this.attackCooldown = conf.cd * atkSpeedMul;
            this.hitDelivered = false;
            this.lastAttackKind = resolveKind;
            if(this===STATE.player) STATE.brawlStarted = true;
            // animation pick - prefer weapon swing if the current atlas has those
            // anim rows; otherwise fall back to the generic 'attack' (enemy skins).
            let animName;
            if(this.team==='player' && this.anims.belt && this.anims.broom){
                animName = (this.weapon==='broom'?'broom':'belt');
            } else {
                animName = 'attack';
            }
            this.play(animName, {force:true});
            const baseDmg = this.dmg + (this.weapon==='belt'?6:this.weapon==='broom'?2:0);
            // Belt is a flail - longer reach and a wide horizontal sweep that cleaves multiple enemies.
            const baseReach = this.reach + (this.weapon==='belt'?3.0:this.weapon==='broom'?1.8:0);
            const baseArc   = this.weapon==='belt'?2.4:this.weapon==='broom'?1.0:1.2;
            const rageMul = (this===STATE.player && STATE.powerups.rage>0) ? 2.0 : 1.0;
            this._pendingHit = {
                kind: resolveKind,
                move: conf.move || resolveKind,
                reach: baseReach + conf.reachAdd,
                arc: conf.arc || baseArc,
                dmg: Math.round(baseDmg * conf.dmgMul * rageMul),
                kb: conf.kbMul,
                big: conf.big,
                finisher: !!conf.finisher,
                wind: conf.wind,
                launchY: conf.launchY || 0,
                launchForward: conf.launchForward || 0,
            };
            if(this===STATE.player){
                const fwd=new THREE.Vector3(Math.sin(this.facing),0,Math.cos(this.facing));
                if(conf.lunge){
                    this.attackLungeVel = fwd.multiplyScalar(conf.lunge);
                    this.attackLungeTime = 0.12;
                }
                spawnSwingArc(this, this._pendingHit);
            }
            // SFX
            if(this===STATE.player){
                playSfx(resolveKind==='heavy' ? 'heavy' : resolveKind==='finisher' ? 'finisher' : 'light');
                playSfx('swoosh');
            }
        }

        // land the hit partway through the attack anim
        resolveHit(){
            if(this.hitDelivered || !this._pendingHit) return;
            const isAttackAnim = (this.anim==='attack'||this.anim==='belt'||this.anim==='broom');
            if(!isAttackAnim) return;
            const a=this.anims[this.anim];
            const wind = (this._pendingHit.wind!=null) ? this._pendingHit.wind : 0.4;
            if(this.frame < Math.floor(a.len*wind)) return; // wait for swing
            this.hitDelivered=true;
            const cfg=this._pendingHit;
            const fwd=new THREE.Vector3(Math.sin(this.facing),0,Math.cos(this.facing));
            let hitAny=false, hitCount=0;
            for(const o of STATE.entities){
                if(o.state!=='alive') continue;
                if(!isHostile(this,o)) continue;
                const to=new THREE.Vector3().subVectors(o.mesh.position,this.mesh.position);
                const dist=to.length();
                if(dist<cfg.reach){
                    to.normalize();
                    if(fwd.angleTo(to)<cfg.arc){
                        const flavor = cfg.finisher ? 'crit' : (cfg.kind==='heavy' || cfg.move==='sweep' ? 'big' : 'normal');
                        o.takeDamage(cfg.dmg, fwd, {attacker:this, kb:cfg.kb, flavor});
                        if(this===STATE.player && o.team!=='player' && (cfg.launchY || cfg.finisher || cfg.move==='sweep')){
                            const up = cfg.launchY || (cfg.move==='sweep' ? 5.0 : 7.5);
                            const out = cfg.launchForward || (cfg.move==='sweep' ? 8.0 : 11.0);
                            o.airborne = true;
                            o.airVel = new THREE.Vector3(fwd.x*out, up, fwd.z*out);
                            o.tumbleSpin = (Math.random()<0.5?-1:1) * (8 + Math.random()*5);
                            o._bounceCount = 0;
                            o._thrownHits = null;
                        }
                        hitAny=true; hitCount++;
                        spawnHit(o.mesh.position.x, SPRITE_SCALE*0.5, o.mesh.position.z, this===STATE.player && (cfg.big||cfg.finisher));
                        playSfx('hit');
                    }
                }
            }
            if(hitAny){
                // hit-stop scales with how chunky the hit was
                const stop = cfg.finisher ? 0.16 : (cfg.kind==='heavy' || cfg.move==='sweep' ? 0.10 : 0.05);
                triggerHitStop(stop);
                triggerShake(cfg.finisher?1.4:cfg.kind==='heavy'?0.9:cfg.move==='sweep'?0.65:0.4, cfg.finisher?0.35:cfg.kind==='heavy'?0.25:0.15);
                if(this===STATE.player){
                    // combo bookkeeping
                    if(cfg.finisher){
                        this.comboHits = 0;
                        this.comboTimer = 0;
                    } else {
                        this.comboHits = Math.min(3, this.comboHits+1);
                        this.comboTimer = 1.4;
                    }
                    gainSpecial(cfg.finisher? 25 : cfg.kind==='heavy'? 12 : 6 * hitCount);
                    registerCombo();
                    updateComboHUD();
                }
            }
        }

        throwAction(){
            if(this!==STATE.player) return;
            if(this.throwCooldown>0 || this.state!=='alive' || this.locked || this.blocking || this.stunTimer>0 || this.dodgeTime>0) return;
            this.throwCooldown = 0.75;
            this.attackCooldown = Math.max(this.attackCooldown, 0.25);
            STATE.brawlStarted = true;
            const pos=this.mesh.position;
            const fwd=new THREE.Vector3(Math.sin(this.facing),0,Math.cos(this.facing));
            let grabbed=null, best=999;
            for(const o of STATE.entities){
                if(o.state!=='alive' || !isHostile(this,o) || o.airborne) continue;
                const to=new THREE.Vector3().subVectors(o.mesh.position,pos); to.y=0;
                const d=to.length();
                if(d<2.65 && d<best){ grabbed=o; best=d; }
            }
            if(grabbed){
                this.faceTo(grabbed.mesh.position.x, grabbed.mesh.position.z);
                const dir=new THREE.Vector3(Math.sin(this.facing),0,Math.cos(this.facing));
                const animName=this.anims.throw?'throw':((this.anims.belt&&this.anims.broom)?(this.weapon==='broom'?'broom':'belt'):'attack');
                this.play(animName,{force:true});
                spawnThrowRelease(this, 'grab');
                grabbed.takeDamage(10, dir, {attacker:this, kb:0.2, flavor:'big'});
                grabbed.airborne = true;
                grabbed.airVel = new THREE.Vector3(dir.x*18, 8.5, dir.z*18);
                grabbed.tumbleSpin = (Math.random()<0.5?-1:1) * 12;
                grabbed._bounceCount = 0;
                grabbed._thrownHits = new Set([grabbed]);
                grabbed.stunTimer = Math.max(grabbed.stunTimer, 1.0);
                triggerHitStop(0.08); triggerShake(1.0,0.22); playSfx('heavy');
                return;
            }

            let pickup=null, pd=999;
            for(const pk of STATE.pickups){
                const d=pk.mesh.position.distanceTo(pos);
                if(d<2.6 && d<pd){ pickup=pk; pd=d; }
            }
            let kind='boot';
            let start=pos.clone().add(fwd.clone().multiplyScalar(1.0));
            start.y = 1.65;
            if(pickup){
                kind = pickup.type || pickup.kind || 'street';
                start = pickup.mesh.position.clone();
                start.y = 1.45;
                scene.remove(pickup.mesh);
                const idx=STATE.pickups.indexOf(pickup); if(idx>=0) STATE.pickups.splice(idx,1);
            }
            const aim = nearestHostile(pos, 22) || null;
            let dir=fwd.clone();
            if(aim){ dir.subVectors(aim.mesh.position,pos); dir.y=0; if(dir.lengthSq()>0.001) dir.normalize(); else dir=fwd.clone(); }
            const animName=this.anims.throw?'throw':((this.anims.belt&&this.anims.broom)?(this.weapon==='broom'?'broom':'belt'):'attack');
            this.play(animName,{force:true});
            spawnThrowRelease(this, kind);
            spawnThrownProjectile(this, kind, start, dir);
            playSfx('swoosh');
        }

        dodge(dirVec){
            if(this.state!=='alive' || this.dodgeCool>0 || this.dodgeTime>0 || this.stunTimer>0) return;
            this.dodgeCool = 0.85 * ((this===STATE.player) ? STATE.stats.dodgeCD : 1.0);
            this.dodgeTime = 0.32;
            this.invuln   = Math.max(this.invuln, 0.28);
            this.locked   = false;
            this.play('run', {force:true});
            const d = dirVec.lengthSq()>0.001 ? dirVec.clone().normalize()
                       : new THREE.Vector3(Math.sin(this.facing),0,Math.cos(this.facing));
            this.dodgeVel = d.multiplyScalar(18);
            if(this===STATE.player) playSfx('dodge');
        }
        startBlock(){
            if(this.state!=='alive' || this.dodgeTime>0 || this.stunTimer>0) return;
            if(this.blocking) return;
            this.blocking = true;
            this.blockStart = 0;
            this.play('idle');
        }
        endBlock(){ this.blocking = false; }
        unleashUltimate(){
            if(this!==STATE.player) return;
            if(STATE.special < 100 || this.state!=='alive') return;
            STATE.special = 0; updateSpecialUI();
            this.invuln = Math.max(this.invuln, 0.9);
            // big AOE shockwave hitting every alive enemy within 12 units
            const px=this.mesh.position.x, pz=this.mesh.position.z;
            const radius = 14;
            const ring=new THREE.Mesh(new THREE.RingGeometry(0.4,1.0,32),
                new THREE.MeshBasicMaterial({color:0xffd24a, transparent:true, side:THREE.DoubleSide, depthWrite:false}));
            ring.rotation.x=-Math.PI/2; ring.position.set(px,0.06,pz);
            ring.userData={kind:'ultring', life:0.55, max:0.55, target:radius};
            scene.add(ring); STATE.fx.push(ring);
            // second tinted ring for impact
            const ring2=ring.clone();
            ring2.material = ring.material.clone();
            ring2.material.color.setHex(0xff8a3d);
            ring2.userData={kind:'ultring', life:0.45, max:0.45, target:radius*0.7};
            scene.add(ring2); STATE.fx.push(ring2);
            triggerHitStop(0.22); triggerShake(2.2, 0.6);
            playSfx('ult');
            for(const o of STATE.entities){
                if(o.state!=='alive' || !isHostile(this,o)) continue;
                const dx=o.mesh.position.x-px, dz=o.mesh.position.z-pz;
                const d=Math.hypot(dx,dz);
                if(d<radius){
                    const dir=new THREE.Vector3(dx/(d||1),0,dz/(d||1));
                    o.takeDamage(120, dir, {attacker:this, kb:5.5, flavor:'crit'});
                    spawnHit(o.mesh.position.x, SPRITE_SCALE*0.6, o.mesh.position.z, true);
                }
            }
            showComboPop('ULTIMATE!');
        }

        die(){
            this.state='dead';
            this.play('death',{force:true});
            this.shadowBlob.material.opacity=0.16;
            this.blocking=false; this.invuln=0; this.dodgeTime=0;
            if(this.team==='player'){
                showMessage('KNOCKED OUT!');
                document.getElementById('restart-btn').classList.remove('hidden');
                STATE.running=false;
                playSfx('ko');
            } else if(this.team==='enemy'){
                STATE.score++; document.getElementById('score').innerText=STATE.score;
                if(STATE.score>STATE.best){
                    STATE.best=STATE.score; document.getElementById('best').innerText=STATE.best;
                    try{ localStorage.setItem('agb_best', STATE.best); }catch(e){}
                }
                if(STATE.player) gainSpecial(15);
                this._deathTimer=1.4;
                // XP + objective progress
                const xpReward = this.isBoss ? (150 + STATE.wave*12) : this.isCaptain ? (60 + STATE.wave*8) : (10 + STATE.wave*2);
                if(typeof awardXP==='function') awardXP(xpReward);
                spawnDamageNumber(this.mesh.position.x, SPRITE_SCALE*0.9, this.mesh.position.z, `+${xpReward} XP`, 'heal');
                if(STATE.objective){
                    if(STATE.objective.kind==='clear'){
                        STATE.objective.progress++;
                        document.getElementById('agb-obj-text').innerText = `CLEAR THE BLOCK (${STATE.objective.progress}/${STATE.objective.target})`;
                        tickObjectiveProgress();
                        if(STATE.objective.progress>=STATE.objective.target){ completeWaveObjective(); }
                    } else if(STATE.objective.kind==='captain' && this.isCaptain){
                        STATE.objective.progress=1;
                        completeWaveObjective();
                    } else if(STATE.objective.kind==='boss' && this.isBoss){
                        STATE.objective.progress=1;
                        completeWaveObjective();
                    }
                }
                if(this===STATE._captain) STATE._captain=null;
                if(this===STATE._boss){ STATE._boss=null; updateBossHealthUI(); }
            } else {
                // ally fades and is removed; no score change, small special tax
                this._deathTimer=1.4;
                if(STATE.player) gainSpecial(-6);
            }
        }

        updateAI(dt){
            if(this.state!=='alive') return;
            if(this.team==='ally'){ this.allyAI(dt); return; }
            if(this.isBoss){ this.bossAI(dt); return; }
            // HAWKS-JERSEY RALLY: while the mascot boss is alive, any enemy wearing
            // a hawks jersey gets a speed/aggression buff so they read as "coming to help".
            if(this._hawksFan && STATE._boss && STATE._boss.state==='alive'){
                if(!this._hawksBuffApplied){
                    this._baseSpeedOrig = this.speed;
                    this.speed = this.speed * 1.35;
                    this.aggroDelay = Math.min(this.aggroDelay, 0.1);
                    this._hawksBuffApplied = true;
                }
            } else if(this._hawksBuffApplied){
                this.speed = this._baseSpeedOrig || this.speed;
                this._hawksBuffApplied = false;
            }
            // ENEMY AI
            if(!STATE.brawlStarted){
                // Wander on the sidewalk-ish zone — pick a random nearby point and stroll toward it.
                this.wanderTick(dt, 0.6);
                return;
            }
            this.aggroDelay-=dt;
            if(this.aggroDelay>0){
                // even when "not yet engaged", they shouldn't be statues — wander instead.
                this.wanderTick(dt, 0.6);
                return;
            }

            // Pick a hostile target — prefer the closest live player/ally.
            if(!this.target || this.target.state!=='alive') this.target=null;
            if(!this.target){
                let nd=Infinity, best=null;
                for(const o of STATE.entities){
                    if(o.state!=='alive' || !isHostile(this,o)) continue;
                    const dx=o.mesh.position.x-this.mesh.position.x, dz=o.mesh.position.z-this.mesh.position.z;
                    const d2=dx*dx+dz*dz;
                    // strong bias toward the player so a fan-mob still threatens the boss
                    const score = (o.team==='player') ? d2*0.5 : d2;
                    if(score<nd){ nd=score; best=o; }
                }
                this.target=best;
            }
            if(!this.target || this.target.state!=='alive'){ this.wanderTick(dt, 0.55); return; }

            const d=new THREE.Vector3().subVectors(this.target.mesh.position,this.mesh.position);
            const dist=d.length();
            this.faceTo(this.target.mesh.position.x,this.target.mesh.position.z);
            if(dist>this.reach*0.8){
                d.normalize();
                const mx=d.x*this.speed*dt, mz=d.z*this.speed*dt;
                if(!checkCollision(this.mesh.position.x+mx,this.mesh.position.z,0.6)) this.mesh.position.x+=mx;
                if(!checkCollision(this.mesh.position.x,this.mesh.position.z+mz,0.6)) this.mesh.position.z+=mz;
                if(!this.locked) this.play('run');
            } else {
                if(!this.locked) this.play('idle');
                this.attack(Math.random()<0.18 ? 'heavy' : 'light');
            }
        }

        allyAI(dt){
            // Find the nearest live enemy within sight range; otherwise drift toward the player.
            let nearest=null, nd=Infinity;
            const SIGHT=26;
            for(const o of STATE.entities){
                if(o.state!=='alive' || o.team!=='enemy') continue;
                const dx=o.mesh.position.x-this.mesh.position.x, dz=o.mesh.position.z-this.mesh.position.z;
                const d2=dx*dx+dz*dz;
                if(d2<nd && d2 < SIGHT*SIGHT){ nd=d2; nearest=o; }
            }
            if(nearest){
                const dx=nearest.mesh.position.x-this.mesh.position.x;
                const dz=nearest.mesh.position.z-this.mesh.position.z;
                const dist=Math.sqrt(nd);
                this.faceTo(nearest.mesh.position.x, nearest.mesh.position.z);
                if(dist>this.reach*0.85){
                    const nx=dx/dist, nz=dz/dist;
                    const mx=nx*this.speed*dt, mz=nz*this.speed*dt;
                    if(!checkCollision(this.mesh.position.x+mx,this.mesh.position.z,0.6)) this.mesh.position.x+=mx;
                    if(!checkCollision(this.mesh.position.x,this.mesh.position.z+mz,0.6)) this.mesh.position.z+=mz;
                    if(!this.locked) this.play('run');
                } else {
                    if(!this.locked) this.play('idle');
                    this.attack('light');
                }
                return;
            }
            // No enemy in sight: follow the player at a small offset.
            if(STATE.player && STATE.player.state==='alive'){
                const pp=STATE.player.mesh.position;
                const dx=pp.x-this.mesh.position.x, dz=pp.z-this.mesh.position.z;
                const dist=Math.hypot(dx,dz);
                if(dist>4.5){
                    const nx=dx/dist, nz=dz/dist;
                    const mx=nx*this.speed*0.92*dt, mz=nz*this.speed*0.92*dt;
                    if(!checkCollision(this.mesh.position.x+mx,this.mesh.position.z,0.6)) this.mesh.position.x+=mx;
                    if(!checkCollision(this.mesh.position.x,this.mesh.position.z+mz,0.6)) this.mesh.position.z+=mz;
                    if(!this.locked) this.play('run');
                    this.faceTo(pp.x,pp.z);
                } else {
                    // small idle wander near the player
                    this.wanderTick(dt, 0.35);
                }
            } else {
                if(!this.locked) this.play('idle');
            }
        }

        // ---- HAWKS BOSS: ranged kiter that alternates bazooka + t-shirt cannon ----
        bossAI(dt){
            if(!STATE.brawlStarted){ this.wanderTick(dt,0.4); return; }
            if(!this.target || this.target.state!=='alive'){
                let nd=Infinity,best=null;
                for(const o of STATE.entities){
                    if(o.state!=='alive'||!isHostile(this,o)) continue;
                    const dx=o.mesh.position.x-this.mesh.position.x, dz=o.mesh.position.z-this.mesh.position.z;
                    const d2=dx*dx+dz*dz; const score=(o.team==='player')?d2*0.4:d2;
                    if(score<nd){ nd=score; best=o; }
                }
                this.target=best;
            }
            if(!this.target){ this.wanderTick(dt,0.4); return; }
            const tp=this.target.mesh.position;
            const d=new THREE.Vector3(tp.x-this.mesh.position.x,0,tp.z-this.mesh.position.z);
            const dist=d.length();
            this.faceTo(tp.x,tp.z);
            if(dist>0.001) d.normalize();
            if(this._fireCd===undefined) this._fireCd=1.4;
            this._fireCd-=dt;
            const PREF=13, MIN=8;
            // kite to keep the player in the firing band
            if(!this.locked){
                let mv=0;
                if(dist>PREF) mv=1; else if(dist<MIN) mv=-1;
                if(mv!==0){
                    const sp=this.speed*dt*mv;
                    const mx=d.x*sp, mz=d.z*sp;
                    if(!checkCollision(this.mesh.position.x+mx,this.mesh.position.z,0.9)) this.mesh.position.x+=mx;
                    if(!checkCollision(this.mesh.position.x,this.mesh.position.z+mz,0.9)) this.mesh.position.z+=mz;
                    this.play('run');
                } else {
                    this.play('idle');
                }
            }
            // fire when roughly in band and off cooldown
            if(this._fireCd<=0 && !this.locked && dist<=PREF+5 && dist>=MIN-4){
                this.bossFire();
                this._fireCd = 1.7 + Math.random()*0.9;
            }
        }
        bossFire(){
            if(!this.target || this.target.state!=='alive') return;
            const tp=this.target.mesh.position;
            const dir=new THREE.Vector3(tp.x-this.mesh.position.x,0,tp.z-this.mesh.position.z);
            if(dir.lengthSq()<0.0001) return;
            dir.normalize();
            this._altFire=!this._altFire;
            const anim = this._altFire ? 'attack' : 'attack2';   // bazooka / t-shirt cannon
            const kind = this._altFire ? 'basketball' : 'boot';
            this.play(anim,{force:true});
            const self=this;
            setTimeout(()=>{
                if(self.state!=='alive' || !self.target) return;
                const start=self.mesh.position.clone();
                start.y = 3.0;
                spawnThrownProjectile(self, kind, start, dir);
                spawnHit(start.x, start.y, start.z, false);
                try{ playSfx('special'); }catch(e){}
            }, 200);
        }

        wanderTick(dt, speedMul){
            // Stroll to a random nearby point. Re-picks when reached or after a few seconds.
            if(!this._wander || this._wanderT<=0 || this._wanderReached){
                const r=8+Math.random()*10, a=Math.random()*Math.PI*2;
                this._wander = { x:this.mesh.position.x+Math.cos(a)*r, z:this.mesh.position.z+Math.sin(a)*r };
                this._wanderT = 3.0+Math.random()*3.0;
                this._wanderReached = false;
            }
            this._wanderT -= dt;
            const dx=this._wander.x-this.mesh.position.x, dz=this._wander.z-this.mesh.position.z;
            const d=Math.hypot(dx,dz);
            if(d<0.7){ this._wanderReached=true; if(!this.locked) this.play('idle'); return; }
            const nx=dx/d, nz=dz/d;
            const mx=nx*this.speed*(speedMul||0.5)*dt, mz=nz*this.speed*(speedMul||0.5)*dt;
            let moved=false;
            if(!checkCollision(this.mesh.position.x+mx,this.mesh.position.z,0.6)){ this.mesh.position.x+=mx; moved=true; }
            if(!checkCollision(this.mesh.position.x,this.mesh.position.z+mz,0.6)){ this.mesh.position.z+=mz; moved=true; }
            if(!moved){ this._wanderReached=true; return; }
            this.faceTo(this.mesh.position.x+nx, this.mesh.position.z+nz);
            if(!this.locked) this.play('run');
        }
    }

    // ---- WEAPON PICKUP (switch hero between belt & broom) ----
    class Pickup{
        constructor(x,z,type,chunkKey){
            this.type=type; this.chunkKey=chunkKey;
            const g=new THREE.Group();
            if(type==='belt'){
                const strap=new THREE.Mesh(new THREE.TorusGeometry(0.7,0.16,8,20),toon(0x8b5a2b)); strap.rotation.x=Math.PI/2; addOutline(strap); g.add(strap);
                const buckle=new THREE.Mesh(new THREE.BoxGeometry(.4,.4,.18),toon(0xd9c44a)); buckle.position.z=.7; g.add(buckle);
            } else {
                const stick=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,2.2,8),toon(0xcaa46a)); stick.rotation.z=Math.PI/5; addOutline(stick); g.add(stick);
                const br=new THREE.Mesh(new THREE.CylinderGeometry(.32,.5,.7,10),toon(0xd9a23a)); br.position.set(.62,-.85,0); br.rotation.z=Math.PI/5; addOutline(br); g.add(br);
            }
            g.scale.set(1.3,1.3,1.3);
            this.mesh=g; this.mesh.position.set(x,1.1,z); scene.add(g);
            STATE.pickups.push(this);
        }
    }
    // ============================================================
    //  ENDLESS CITY CHUNKS
    // ============================================================
    function generateChunk(cx,cz){
        const chunk=new THREE.Group();
        chunk.position.set(cx*CHUNK_SIZE,0,cz*CHUNK_SIZE);
        chunk.colliders=[];
        chunk.buildings=[];   // building Group refs, for camera occlusion fade
        // helper: add a square AABB collider in world coords
        const addBox=(wx,wz,rx,rz)=>{
            chunk.colliders.push({ minX:wx-rx, maxX:wx+rx, minZ:wz-rz, maxZ:wz+rz });
        };

        const street=new THREE.Mesh(new THREE.BoxGeometry(CHUNK_SIZE,1,CHUNK_SIZE), streetMat());
        street.position.y=-.5; street.receiveShadow=true; chunk.add(street);

        // ---- LAYOUT GEOMETRY ----
        // Smaller, tighter islands so the streets between them are wide enough
        // for proper combat movement.
        //   center cross road  = 2 * (offset - size/2)        =  20 units (was 8)
        //   chunk-border road  = 2 * (CHUNK/2 - (offset+size/2)) ≈ 24 units (was 20)
        // ONE 60×60 city block per chunk, built as a HOLLOW PERIMETER of
        // buildings: four rows line the four streets, doors face outward,
        // and the interior is a sealed dead zone — no more trap-alley.
        const islands=[{x:0,z:0,w:60,d:60}];
        const hasCenterCross = false;
        // Per-chunk base height so the block reads as coherent rather than as
        // a jagged stair-step of mismatched random heights.
        const blockBaseHeight = 20 + Math.random()*14;

        // ---- road markings ----
        const yellow=new THREE.MeshBasicMaterial({color:0xf2c14e});
        const white =new THREE.MeshBasicMaterial({color:0xf5f1e6});

        // Center-cross road markings (only if not blocked by buildings)
        if(hasCenterCross){
            chunk.add(buildRoadMarkings('x', 0, CHUNK_SIZE, 20));
            chunk.add(buildRoadMarkings('z', 0, CHUNK_SIZE, 20));
            // crosswalks just inside each side of the wider center intersection
            chunk.add(buildCrosswalk( 0, -11, 'x', 20));
            chunk.add(buildCrosswalk( 0,  11, 'x', 20));
            chunk.add(buildCrosswalk(-11,  0, 'z', 20));
            chunk.add(buildCrosswalk( 11,  0, 'z', 20));
        }

        // Border-road markings: each chunk paints its 10-unit half so the 20-unit
        // chunk-boundary road tiles cleanly with the neighbour.
        const halfBorder = new THREE.Group();
        for(const bz of [-CHUNK_SIZE/2, CHUNK_SIZE/2]){
            for(let s=-CHUNK_SIZE/2+1.2; s<CHUNK_SIZE/2; s+=5.0){
                const m=new THREE.Mesh(new THREE.BoxGeometry(2.4,0.04,0.22),yellow);
                m.position.set(s,0.025,bz); halfBorder.add(m);
            }
        }
        for(const bx of [-CHUNK_SIZE/2, CHUNK_SIZE/2]){
            for(let s=-CHUNK_SIZE/2+1.2; s<CHUNK_SIZE/2; s+=5.0){
                const m=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.04,2.4),yellow);
                m.position.set(bx,0.025,s); halfBorder.add(m);
            }
        }
        // Border road = 24 wide total (12 per chunk-half). Just a yellow
        // dashed centerline (drawn above) and a single white edge line —
        // reads as a 2-lane road rather than the busier 4-lane.
        for(const bz of [-CHUNK_SIZE/2, CHUNK_SIZE/2]){
            const sign=Math.sign(bz);
            const m=new THREE.Mesh(new THREE.BoxGeometry(CHUNK_SIZE,0.04,0.16),white);
            m.position.set(0,0.025,bz - sign*11.5); halfBorder.add(m);
        }
        for(const bx of [-CHUNK_SIZE/2, CHUNK_SIZE/2]){
            const sign=Math.sign(bx);
            const m=new THREE.Mesh(new THREE.BoxGeometry(0.16,0.04,CHUNK_SIZE),white);
            m.position.set(bx - sign*11.5,0.025,0); halfBorder.add(m);
        }
        chunk.add(halfBorder);

        // ---- traffic lights at the four BIG intersections (chunk corners) ----
        // These intersections always exist (border roads are continuous). Each
        // chunk only places lights on its own four corner-island corners; adjacent
        // chunks place the remaining three lights for each shared intersection.
        // A shared STATE.intersections map keeps every corner's light in sync.
        const corners=[
            { sx:-1, sz:-1 },  // SW corner of this chunk
            { sx: 1, sz:-1 },
            { sx: 1, sz: 1 },
            { sx:-1, sz: 1 },
        ];
        corners.forEach(c=>{
            const ix = cx*CHUNK_SIZE + c.sx*CHUNK_SIZE/2;   // intersection world-center
            const iz = cz*CHUNK_SIZE + c.sz*CHUNK_SIZE/2;
            const key = ix+','+iz;
            if(!STATE.intersections.has(key)){
                // even/odd checkerboard so neighbours alternate phases nicely
                const startGreen = (((ix+iz)/(CHUNK_SIZE/2))|0) % 2 === 0;
                STATE.intersections.set(key,{ x:ix, z:iz, t:Math.random()*8, p0Green:startGreen });
            }
            const inter = STATE.intersections.get(key);

            // light sits on the corner of this chunk's nearest island (NE corner of
            // SW island, etc.), set back ~2 units onto the sidewalk.
            // Sidewalk corner closest to the chunk-corner intersection.
            // Islands now sit at (±19,±19) with size 18×18, so their outer
            // corner is at (±28,±28). Plant the pole ~2 units inside that.
            const lx = c.sx * (CHUNK_SIZE/2 - 14);   // ±26
            const lz = c.sz * (CHUNK_SIZE/2 - 14);
            // Face toward the intersection center
            const faceDeg = Math.atan2(c.sx*CHUNK_SIZE/2 - lx, c.sz*CHUNK_SIZE/2 - lz) * 180/Math.PI;
            const tl=createTrafficLight(faceDeg);
            tl.position.set(lx,0.2,lz);
            // Which axis does this light regulate? Lights on the NE & SW corners
            // (sx*sz>0) regulate east-west (phase 0); NW & SE regulate north-south.
            tl.userData.phase = (c.sx*c.sz>0) ? 0 : 1;
            tl.userData.inter = inter;
            chunk.add(tl); STATE.lights.push(tl);
            addBox(cx*CHUNK_SIZE+lx, cz*CHUNK_SIZE+lz, 0.45, 0.45); // pole collider

            // street sign blade on one corner per intersection
            if(c.sx===-1 && c.sz===-1){
                const ss=createStreetSign(); ss.position.set(lx+1.2,0.2,lz-1.2); chunk.add(ss);
                addBox(cx*CHUNK_SIZE+lx+1.2, cz*CHUNK_SIZE+lz-1.2, 0.3, 0.3);
            }
        });

        // crosswalks at the four BIG intersections + pedestrian walk signals
        corners.forEach(c=>{
            const cxw = c.sx*CHUNK_SIZE/2, czw = c.sz*CHUNK_SIZE/2;
            // crosswalks on the chunk-interior side of the intersection, spanning the 24-wide road
            chunk.add(buildCrosswalk(cxw - c.sx*13, czw, 'z', 24));
            chunk.add(buildCrosswalk(cxw, czw - c.sz*13, 'x', 24));

            // Single combined pedestrian signal on the sidewalk corner, just inside
            // the curb beside the traffic light. Faces the intersection so both
            // crosswalks read it. (One per corner instead of two: cheaper, less clutter.)
            const ix = cx*CHUNK_SIZE + cxw, iz = cz*CHUNK_SIZE + czw;
            const inter = STATE.intersections.get(ix+','+iz);
            if(inter){
                const pos = new THREE.Vector3(c.sx*(CHUNK_SIZE/2 - 15.5), 0.2, c.sz*(CHUNK_SIZE/2 - 15.5));
                const faceDeg = Math.atan2(c.sx, c.sz) * 180/Math.PI;
                const ps = createPedSignal(faceDeg, inter, 'x');
                ps.position.copy(pos); chunk.add(ps); STATE.pedSignals.push(ps);
                addBox(cx*CHUNK_SIZE+pos.x, cz*CHUNK_SIZE+pos.z, 0.25, 0.25);
            }
        });

        islands.forEach(island=>{
            const sidewalk=new THREE.Mesh(new THREE.BoxGeometry(island.w,1.2,island.d), new THREE.MeshToonMaterial({color:COLORS.sidewalk}));
            sidewalk.position.set(island.x,-.4,island.z); sidewalk.receiveShadow=true; addOutline(sidewalk); chunk.add(sidewalk);

            // ---- HOLLOW PERIMETER OF BUILDINGS ----
            // Four rows of buildings line the four streets. S and N rows span
            // the full island width (taking the corners), W and E rows fit
            // between them. Doors face outward on every building. Interior
            // (|x|<INNER_HALF and |z|<INNER_HALF) is sealed off.
            const SIDEWALK = 5;          // visible sidewalk strip on outer edge
            const ROW_DEPTH = 12;        // building depth perpendicular to street
            const halfW = island.w/2;
            const halfD = island.d/2;
            const sStart = -halfW + SIDEWALK;          // = -25
            const sEnd   =  halfW - SIDEWALK;          // = +25
            const innerHalf = halfD - SIDEWALK - ROW_DEPTH;   // = 13
            // Helper: place a single row of buildings sliding along `slideAxis`,
            // with row depth offset along the other axis, all rotated by `ry`.
            function placeRow(slideAxis, slideFrom, slideTo, offset, ry){
                let cur = slideFrom;
                while(cur < slideTo){
                    let bw = 14 + Math.random()*14;          // 14-28 long
                    if(cur + bw > slideTo) bw = slideTo - cur;
                    if(bw < 6){ cur += bw; continue; }
                    // Tight height variance around the per-chunk base
                    const bh = blockBaseHeight + (Math.random()-0.5)*8;
                    const type=['brick','concrete','teal','mustard','plum'][Math.floor(Math.random()*5)];
                    const b = createBuilding(bw, bh, ROW_DEPTH, type, { frontFace:'-z' });
                    const slidePos = cur + bw/2;
                    let bx_local, bz_local, worldW, worldD;
                    if(slideAxis==='x'){
                        bx_local = slidePos; bz_local = offset;
                        worldW = bw; worldD = ROW_DEPTH;
                    } else {
                        bx_local = offset;  bz_local = slidePos;
                        worldW = ROW_DEPTH; worldD = bw;
                    }
                    b.rotation.y = ry;
                    b.position.set(island.x + bx_local, 0.2, island.z + bz_local);
                    chunk.add(b); chunk.buildings.push(b);
                    const absX = cx*CHUNK_SIZE + island.x + bx_local;
                    const absZ = cz*CHUNK_SIZE + island.z + bz_local;
                    chunk.colliders.push({ minX:absX-worldW/2, maxX:absX+worldW/2,
                                           minZ:absZ-worldD/2, maxZ:absZ+worldD/2 });
                    cur += bw;
                }
            }
            // Block-interior collider — keeps wandering NPCs / projectiles out.
            chunk.colliders.push({
                minX: cx*CHUNK_SIZE - innerHalf, maxX: cx*CHUNK_SIZE + innerHalf,
                minZ: cz*CHUNK_SIZE - innerHalf, maxZ: cz*CHUNK_SIZE + innerHalf,
            });
            // South row — slide along x, offset to -z side, doors face -z
            placeRow('x', sStart, sEnd, -halfD + SIDEWALK + ROW_DEPTH/2, 0);
            // North row — slide along x, offset to +z side, doors face +z
            placeRow('x', sStart, sEnd,  halfD - SIDEWALK - ROW_DEPTH/2, Math.PI);
            // West row — slide along z (only between S/N rows), doors face -x
            placeRow('z', -innerHalf, innerHalf, -halfW + SIDEWALK + ROW_DEPTH/2, -Math.PI/2);
            // East row — slide along z, doors face +x
            placeRow('z', -innerHalf, innerHalf,  halfW - SIDEWALK - ROW_DEPTH/2,  Math.PI/2);
            // Weighted prop pool — newsstands are rare (they're chunky, were spamming every corner).
            const propRadii ={hydrant:0.55, newsstand:1.7, trashcan:0.65, planter:1.1};
            const propWeights=[
                ['hydrant', 28],
                ['trashcan',34],
                ['planter', 30],
                ['newsstand', 8],   // ~8% — at most 1 per chunk on average
            ];
            const totalW = propWeights.reduce((s,p)=>s+p[1],0);
            const pickProp = ()=>{
                let r=Math.random()*totalW;
                for(const [name,w] of propWeights){ if((r-=w)<=0) return name; }
                return propWeights[0][0];
            };
            // Props sit on the sidewalk perimeter only — between the building rows
            // and the curb. With a 60×60 island and ~54×54 of buildings inside,
            // that's a ~3-unit strip on each side, plus the two visible side ends.
            let newsstandsThisIsland=0;
            const PROP_COUNT = 6;
            for(let i=0;i<PROP_COUNT;i++){
                let tp=pickProp();
                if(tp==='newsstand' && newsstandsThisIsland>=1) tp='trashcan';
                if(tp==='newsstand') newsstandsThisIsland++;
                const p=createProp(tp);
                // pick a side of the island perimeter
                const side = Math.floor(Math.random()*4);
                const inset = 1.5;
                let px, pz;
                if(side===0){       // south edge (curb)
                    px = island.x + (Math.random()-0.5)*(island.w-4);
                    pz = island.z - island.d/2 + inset;
                } else if(side===1){ // north edge
                    px = island.x + (Math.random()-0.5)*(island.w-4);
                    pz = island.z + island.d/2 - inset;
                } else if(side===2){ // west edge
                    px = island.x - island.w/2 + inset;
                    pz = island.z + (Math.random()-0.5)*(island.d-4);
                } else {             // east edge
                    px = island.x + island.w/2 - inset;
                    pz = island.z + (Math.random()-0.5)*(island.d-4);
                }
                p.position.set(px,0.2,pz); p.rotation.y=Math.random()*Math.PI; chunk.add(p);
                const r=propRadii[tp]||0.6;
                addBox(cx*CHUNK_SIZE+px, cz*CHUNK_SIZE+pz, r, r);
            }
            // Lamp posts on each of the four sidewalk corners
            for(const [sx,sz] of [[-1,-1],[1,-1],[-1,1],[1,1]]){
                const lamp=createProp('lamp');
                const lx0 = island.x + sx*(island.w/2 - 1);
                const lz0 = island.z + sz*(island.d/2 - 1);
                lamp.position.set(lx0,0.2,lz0); chunk.add(lamp);
                addBox(cx*CHUNK_SIZE+lx0, cz*CHUNK_SIZE+lz0, 0.35, 0.35);
            }
        });

        // weapon pickup (belt/broom swap)
        if(Math.random()<0.5){
            const type=Math.random()<.72?'broom':'belt';
            const isl=islands[Math.floor(Math.random()*islands.length)];
            const px=isl.x+(Math.random()-.5)*(isl.w-6), pz=isl.z+(Math.random()-.5)*(isl.d-6);
            new Pickup(cx*CHUNK_SIZE+px,cz*CHUNK_SIZE+pz,type,`${cx},${cz}`);
        }

        // parked street vehicles — always on a real road shoulder, never inside an
        // island, and never within ~16 units of an intersection (so they don't block
        // the corner traffic-lights or sit in a crosswalk).
        const vTypes=['taxi','electric','delivery','garbage'];
        const parkedCount = Math.floor(Math.random()*3);
        for(let i=0;i<parkedCount;i++){
            const v=createVehicle(vTypes[Math.floor(Math.random()*vTypes.length)]);
            // along ∈ [-20, 20] keeps clear of both ±CHUNK_SIZE/2 corners.
            const along = (Math.random()-.5) * 40;
            const side = Math.random()<.5 ? -1 : 1;
            if(Math.random()<.5){
                const shoulderZ = side*(CHUNK_SIZE/2 - 11);   // tucked against the new sidewalk curb (±28)
                v.position.set(along,0.2,shoulderZ);
                v.rotation.y = side<0 ? Math.PI/2 : -Math.PI/2;
                addBox(cx*CHUNK_SIZE+along, cz*CHUNK_SIZE+shoulderZ, 2.0, 3.0);
            } else {
                const shoulderX = side*(CHUNK_SIZE/2 - 11);
                v.position.set(shoulderX,0.2,along);
                v.rotation.y = side<0 ? 0 : Math.PI;
                addBox(cx*CHUNK_SIZE+shoulderX, cz*CHUNK_SIZE+along, 3.0, 2.0);
            }
            chunk.add(v);
        }

        scene.add(chunk);
        STATE.activeChunks.set(`${cx},${cz}`,chunk);
    }

    function updateEndlessCity(){
        if(!STATE.player) return;
        const px=Math.floor(STATE.player.mesh.position.x/CHUNK_SIZE);
        const pz=Math.floor(STATE.player.mesh.position.z/CHUNK_SIZE);
        const need=new Set();
        for(let x=px-1;x<=px+1;x++) for(let z=pz-1;z<=pz+1;z++){
            const k=`${x},${z}`; need.add(k);
            if(!STATE.activeChunks.has(k)) generateChunk(x,z);
        }
        for(const [k,c] of STATE.activeChunks){ if(!need.has(k)){ scene.remove(c); STATE.activeChunks.delete(k); } }
        STATE.pickups=STATE.pickups.filter(p=>{ if(!need.has(p.chunkKey)){ scene.remove(p.mesh); return false; } return true; });
        // drop traffic lights whose chunk got unloaded
        STATE.lights = STATE.lights.filter(l=>{
            let n=l; while(n && n!==scene) n=n.parent;
            return n===scene;
        });
    }

    function updateFX(dt){
        STATE.fx=STATE.fx.filter(m=>{
            const u=m.userData; u.life-=dt;
            const k=Math.max(0,u.life/u.max);
            if(u.kind==='spark'){
                m.position.x+=u.vx*dt; m.position.y+=u.vy*dt; m.position.z+=u.vz*dt;
                u.vy-=11*dt; m.rotation.z+=u.spin*dt;
                m.material.opacity=k; m.scale.setScalar(0.5+ (1-k));
                m.quaternion.copy(camera.quaternion);
            } else if(u.kind==='ring'){
                const s=0.5 + (1-k)*4.5; m.scale.set(s,s,s);
                m.material.opacity=k*0.9; m.quaternion.copy(camera.quaternion);
            } else if(u.kind==='pow'){
                m.position.y+=u.vy*dt;
                m.scale.setScalar(0.7 + (1-k)*0.8);
                m.material.opacity= k<0.3? k/0.3 : 1;
                m.quaternion.copy(camera.quaternion);
            } else if(u.kind==='dmgnum'){
                m.position.x += u.vx*dt;
                m.position.z += u.vz*dt;
                m.position.y += u.vy*dt;
                u.vy -= 5*dt;
                const fadeStart = 0.4;
                m.material.opacity = k>fadeStart ? 1 : Math.max(0,k/fadeStart);
                m.scale.setScalar(0.6 + (1-k)*0.7);
                m.quaternion.copy(camera.quaternion);
            } else if(u.kind==='ultring'){
                const t = 1 - k;
                const s = 0.5 + t*(u.target||10);
                m.scale.set(s,s,s);
                m.material.opacity = k*0.85;
            } else if(u.kind==='swing'){
                m.material.opacity = Math.min(1,k*1.35);
                m.scale.setScalar(0.75 + (1-k)*0.55);
                m.quaternion.copy(camera.quaternion);
                m.rotation.z += (u.spin||0)*dt;
            } else if(u.kind==='throwRelease'){
                m.position.x += (u.vx||0)*dt;
                m.position.z += (u.vz||0)*dt;
                m.material.opacity = Math.min(1,k*1.45);
                m.scale.setScalar(0.72 + (1-k)*0.85);
                m.quaternion.copy(camera.quaternion);
                m.rotation.z += (u.spin||0)*dt;
            }
            if(u.life<=0){ scene.remove(m); return false; }
            return true;
        });
    }
