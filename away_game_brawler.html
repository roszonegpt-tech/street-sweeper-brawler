    const AMBIENT={ birds:[], cars:[] };
    function spawnBird(){
        const g=new THREE.Group();
        const bodyMat=toon(Math.random()<.5?0x2a2a2a:0x4a4a55);
        const body=new THREE.Mesh(new THREE.SphereGeometry(0.3,6,5),bodyMat); body.scale.set(1.4,0.7,0.7); g.add(body);
        const wingGeo=new THREE.PlaneGeometry(1.2,0.5);
        const wMat=new THREE.MeshBasicMaterial({color:0x33333a,side:THREE.DoubleSide});
        const wl=new THREE.Mesh(wingGeo,wMat); wl.position.x=-0.6; g.add(wl);
        const wr=new THREE.Mesh(wingGeo,wMat); wr.position.x=0.6; g.add(wr);
        g.userData={wl,wr,phase:Math.random()*6.28,
            speed:6+Math.random()*4,
            dir:new THREE.Vector3(Math.random()-.5,0,Math.random()-.5).normalize(),
            life:8+Math.random()*6};
        const p=STATE.player?STATE.player.mesh.position:{x:0,z:0};
        g.position.set(p.x+(Math.random()-.5)*60, 16+Math.random()*8, p.z+(Math.random()-.5)*60);
        scene.add(g); AMBIENT.birds.push(g);
    }
    function updateAmbient(dt){
        // birds
        if(AMBIENT.birds.length<5 && Math.random()<dt*0.5) spawnBird();
        AMBIENT.birds=AMBIENT.birds.filter(b=>{
            const u=b.userData; u.life-=dt; u.phase+=dt*14;
            b.position.addScaledVector(u.dir, u.speed*dt);
            const flap=Math.sin(u.phase)*0.6;
            u.wl.rotation.z=flap; u.wr.rotation.z=-flap;
            b.lookAt(b.position.clone().add(u.dir));
            if(u.life<=0){ scene.remove(b); return false; }
            return true;
        });
        // ---- traffic lights: each intersection cycles independently ----
        // p0 = east-west phase. When p0Green is true: EW=green, NS=red. With a
        // YELLOW window before flipping. State is stored on the shared
        // STATE.intersections entry so all 4 corner-lights of an intersection
        // (which can belong to different chunks) read the same value.
        const CYCLE=9.0, YELLOW=1.4;
        for(const inter of STATE.intersections.values()){
            inter.t = (inter.t + dt) % CYCLE;
            const half = CYCLE/2;
            const inFirst = inter.t < half;
            const nearFlip = inFirst ? (inter.t > half - YELLOW)
                                     : (inter.t > CYCLE - YELLOW);
            // "Green axis" this half:
            const greenIsEW = inter.p0Green ? inFirst : !inFirst;
            inter.p0State = greenIsEW ? (nearFlip ? 'yellow' : 'green') : 'red';
            inter.p1State = greenIsEW ? 'red' : (nearFlip ? 'yellow' : 'green');
        }
        STATE.lights = STATE.lights.filter(l => {
            let n=l; while(n && n!==scene) n=n.parent;
            return n===scene;
        });
        for(const l of STATE.lights){
            const inter = l.userData.inter;
            if(!inter) continue;
            const st = (l.userData.phase===0) ? inter.p0State : inter.p1State;
            l.userData.state = st;
            const b=l.userData.bulbs;
            b.r.material.emissiveIntensity = st==='red'    ? 1.2 : 0.05;
            b.y.material.emissiveIntensity = st==='yellow' ? 1.2 : 0.05;
            b.g.material.emissiveIntensity = st==='green'  ? 1.2 : 0.05;
            if(l.userData.walk) l.userData.walk.material.emissiveIntensity = st==='red' ? 1.0 : 0.05;
        }

        // Pedestrian signals — flip between WALK and DON'T WALK icons.
        // Cross axis 'x' = pedestrians traversing the X-axis road, safe when EW (phase 0) is red.
        // Throttle the full-walk to every 0.4 s; we only need the icon to flip on state change.
        if(!AMBIENT._pedT) AMBIENT._pedT=0;
        AMBIENT._pedT += dt;
        if(AMBIENT._pedT < 0.4){ /* keep cycling traffic-light loop above */ }
        else { AMBIENT._pedT = 0; STATE.pedSignals = STATE.pedSignals.filter(p=>{
            let n=p; while(n && n!==scene) n=n.parent;
            return n===scene;
        }); }
        for(const p of STATE.pedSignals){
            const inter=p.userData.inter; if(!inter) continue;
            const regulating = p.userData.axis==='x' ? inter.p0State : inter.p1State;
            const walkOK = (regulating==='red');
            // Yellow flashes the hand to warn "finish crossing now"
            const flashing = (regulating==='yellow');
            const screen = p.userData.screen;
            const want = walkOK ? 'walk' : 'hand';
            if(p.userData.lastState !== want){
                screen.material.map = pedIcon(want);
                screen.material.needsUpdate = true;
                p.userData.lastState = want;
            }
            // dim/flash the screen
            if(flashing){
                const t = (Date.now()*0.006) % 1;
                screen.material.opacity = t<0.5 ? 1.0 : 0.25;
            } else {
                screen.material.opacity = 1.0;
            }
        }

        // helper: should this car stop for a red/yellow light at the next intersection?
        function shouldStopAt(c){
            const u=c.userData;
            if(!u.axis) return false;
            const px=c.position.x, pz=c.position.z;
            const stopDist=10, laneTol=12;
            for(const inter of STATE.intersections.values()){
                if(u.axis==='x'){
                    if(Math.abs(pz - inter.z) > laneTol) continue;
                    const ahead = (inter.x - px) * Math.sign(u.dir.x) - 6.5;
                    if(ahead > 0 && ahead < stopDist){
                        const st=inter.p0State;
                        if(st==='red' || st==='yellow') return true;
                    }
                } else {
                    if(Math.abs(px - inter.x) > laneTol) continue;
                    const ahead = (inter.z - pz) * Math.sign(u.dir.z) - 6.5;
                    if(ahead > 0 && ahead < stopDist){
                        const st=inter.p1State;
                        if(st==='red' || st==='yellow') return true;
                    }
                }
            }
            // pedestrian ahead? Cautious drivers brake; reckless ones don't.
            if(u.cautious){
                for(const o of STATE.entities){
                    if(o.state!=='alive') continue;
                    const op=o.mesh.position;
                    if(u.axis==='x'){
                        if(Math.abs(op.z - pz) > 2.4) continue;
                        const ahead = (op.x - px)*Math.sign(u.dir.x);
                        if(ahead>0 && ahead<7) return true;
                    } else {
                        if(Math.abs(op.x - px) > 2.4) continue;
                        const ahead = (op.z - pz)*Math.sign(u.dir.z);
                        if(ahead>0 && ahead<7) return true;
                    }
                }
            }
            return false;
        }

        // drifting cars — smooth braking at lights, despawn off-screen.
        // Reckless drivers (small chance) plow through anyone in front.
        AMBIENT.cars=AMBIENT.cars.filter(c=>{
            const u=c.userData; u.life-=dt;
            const target = shouldStopAt(c) ? 0 : (u.cruise||u.speed);
            u.speed += (target - u.speed) * Math.min(1, dt*3.5);
            c.position.addScaledVector(u.dir, u.speed*dt);
            // car-vs-entity overlap: damage anyone the car is plowing into
            if(u.hitCool>0) u.hitCool-=dt;
            if(u.speed > 1.2 && (u.hitCool||0)<=0){
                for(const o of STATE.entities){
                    if(o.state!=='alive') continue;
                    const op=o.mesh.position;
                    const dx=op.x - c.position.x, dz=op.z - c.position.z;
                    if(Math.abs(dx)<2.0 && Math.abs(dz)<3.0){
                        const dmg = (o===STATE.player) ? 22 : 35;
                        o.takeDamage(dmg, u.dir.clone());
                        // Launch them through the air — car physics! Strong forward push
                        // and a vertical pop scaled with car speed; entity tumbles, lands,
                        // and the position-update path makes them slide a short distance.
                        // Set these AFTER takeDamage so they aren't overwritten by its kb.
                        const launchH = 3.0 + u.speed*0.35;
                        const launchV = 6.5 + u.speed*0.45;
                        o.airVel = new THREE.Vector3(u.dir.x*launchH, launchV, u.dir.z*launchH);
                        o.airborne = true;
                        o.tumbleSpin = (Math.random()<.5?-1:1) * (6 + u.speed*0.35);
                        o.kbVel = new THREE.Vector3(u.dir.x*launchH*0.6, 0, u.dir.z*launchH*0.6);
                        o.kbTime = 0.55;
                        spawnHit(op.x, 1.4, op.z, true);
                        triggerHitStop(0.08); triggerShake(1.4, 0.35);
                        playSfx('finisher');
                        u.hitCool = 1.0;
                        break;
                    }
                }
            }
            if(u.life<=0){ scene.remove(c); return false; }
            return true;
        });

        if(STATE.player && AMBIENT.cars.length<4 && Math.random()<dt*0.4){
            const v=createVehicle(['taxi','electric','delivery','garbage'][Math.floor(Math.random()*4)]);
            const p=STATE.player.mesh.position;
            const onX=Math.random()<.5;
            const cruise = 7+Math.random()*4;
            // ALWAYS spawn on a chunk-BORDER road (these are continuous in every
            // chunk layout, unlike the chunk-center cross which gets blocked by
            // long buildings). Border roads sit at world coords = CHUNK_SIZE*n + CHUNK_SIZE/2,
            // i.e. multiples of CHUNK_SIZE offset by +40. Lane offset = ±2.5 (right-hand traffic).
            const snapBorder = (q)=> CHUNK_SIZE * Math.round((q - CHUNK_SIZE/2) / CHUNK_SIZE) + CHUNK_SIZE/2;
            // 2-lane road, 12 per side. Drive ~6 units off the centerline (curb-side).
            const laneChoice = 6;
            if(onX){
                const roadZ = snapBorder(p.z);
                const dir = (Math.random()<.5) ? 1 : -1;
                const lane = roadZ + (dir>0 ? -laneChoice : laneChoice);
                const sx = p.x + (dir>0 ? -55 : 55);
                v.position.set(sx,0.2,lane);
                v.rotation.y = dir>0 ? Math.PI/2 : -Math.PI/2;
                v.userData={ dir:new THREE.Vector3(dir,0,0), speed:cruise, cruise, life:22, axis:'x', cautious: Math.random()>0.18, hitCool:0 };
            } else {
                const roadX = snapBorder(p.x);
                const dir = (Math.random()<.5) ? 1 : -1;
                const lane = roadX + (dir>0 ? laneChoice : -laneChoice);
                const sz = p.z + (dir>0 ? -55 : 55);
                v.position.set(lane,0.2,sz);
                v.rotation.y = dir>0 ? 0 : Math.PI;
                v.userData={ dir:new THREE.Vector3(0,0,dir), speed:cruise, cruise, life:22, axis:'z', cautious: Math.random()>0.18, hitCool:0 };
            }
            scene.add(v); AMBIENT.cars.push(v);
        }
    }

    // ============================================================
    //  SPAWNING
    // ============================================================
    const ENEMY_KINDS=['blue','red','black'];
    function spawnEnemy(opts){
        opts = opts || {};
        const kind = opts.kind || ENEMY_KINDS[Math.floor(Math.random()*ENEMY_KINDS.length)];
        const angle=Math.random()*Math.PI*2;
        const dist=24+Math.random()*14;
        let sx=STATE.player.mesh.position.x+Math.cos(angle)*dist;
        let sz=STATE.player.mesh.position.z+Math.sin(angle)*dist;
        // nudge out of walls
        let tries=0;
        while(checkCollision(sx,sz,0.8)&&tries++<6){ sx+=(Math.random()-.5)*6; sz+=(Math.random()-.5)*6; }
        const e = new Character(sx,sz,{
            team:'enemy', atlas:kind, anims:ENEMY_ANIMS,
            hp:60+STATE.wave*6, speed:5.5+Math.random()*2.2,
            dmg:9+STATE.wave, reach:3.2,
        });
        // hawks-jersey enemies are flagged for boss-rally behavior (see updateAI)
        if(kind==='hawks' || kind==='hawks_v2') e._hawksFan = true;
        // ensure we never spawn already-inside a building (the nudge loop above
        // tries 6 random offsets but can still land inside a thick collider).
        unstickFromColliders(e);
        return e;
    }
    // Pick an atlas for "hawks-jersey adds" — prefer the v2 atlas if loaded.
    function pickHawksAddAtlas(){
        if(TEX['hawks_v2']) return 'hawks_v2';
        if(TEX['hawks'])    return 'hawks';
        return null;
    }
    function handleSpawning(dt){
        if(!STATE.player||STATE.player.state!=='alive') return;
        if(!STATE.objective) return;   // no objective yet (between waves) — no spawns
        document.getElementById('wave').innerText=STATE.wave;
        // captain wave: spawn one captain, then a trickle of normal enemies as escorts
        if(STATE._captainPending){ spawnCaptain(); }
        if(STATE._bossPending){ spawnBoss(); }
        const cap=Math.min(STATE.enemyCap, 4+STATE.wave*2);
        const alive=STATE.entities.filter(e=>e.team==='enemy'&&e.state==='alive').length;
        if(STATE.objective.kind==='boss'){
            // a few escort fans trickle in alongside the boss — when the v2 mascot
            // is the boss, the escorts wear hawks jerseys so they read as "his guys".
            const hawksAdd = pickHawksAddAtlas();
            if(alive<3 && Math.random()<0.4*dt*2){
                spawnEnemy(hawksAdd ? { kind: hawksAdd } : undefined);
            }
            // extra rally wave: while boss is up, periodically send a hawks-jersey reinforcement
            if(STATE._boss && STATE._boss.state==='alive' && hawksAdd){
                STATE._bossAddTimer = (STATE._bossAddTimer||0) - dt;
                if(STATE._bossAddTimer <= 0 && alive < 6){
                    spawnEnemy({ kind: hawksAdd });
                    STATE._bossAddTimer = 5.5 + Math.random()*2.0;
                }
            }
        } else if(STATE.objective.kind==='clear'){
            // limit total spawns so the wave actually ends — only spawn while still owing kills.
            const stillNeeded = STATE.objective.target - STATE.objective.progress;
            const allowed = Math.min(cap, stillNeeded);
            if(alive<allowed && Math.random()<0.9*dt*2){ spawnEnemy(); }
        } else if(STATE.objective.kind==='reach'){
            if(alive<3 && Math.random()<0.5*dt*2){ spawnEnemy(); }
        } else if(STATE.objective.kind==='captain'){
            if(alive<4 && Math.random()<0.6*dt*2){ spawnEnemy(); }
        }
        // chance to drop a powerup periodically
        if(!STATE._puTick) STATE._puTick=0;
        STATE._puTick += dt;
        if(STATE._puTick>10){ STATE._puTick=0; maybeSpawnPowerUp(); }
    }

    function makeHero(x,z){
        return new Character(x,z,{
            team:'player', atlas:'hero', anims:HERO_ANIMS,
            hp:100, speed:11, dmg:16, reach:3.0, weapon:'belt',
        });

    // ---- KNICKS-FAN ALLY (recruited from defeated enemies) ----
    // If the user provides a dedicated 'knicks' atlas it's used automatically;
    // otherwise we fall back to the blue-team enemy atlas and tint the silhouette
    // Knicks blue/orange so they read as allies.
    function pickKnicksAtlas(){
        // Preferred pool: the two recruit characters when their atlases are loaded.
        // We alternate male/female so both show up; if neither is loaded, fall back
        // to the original 'knicks' atlas, then to the blue enemy atlas + tint.
        const pool = [];
        if(TEX['heavy_bball']) pool.push('heavy_bball');
        if(TEX['fighter_f'])   pool.push('fighter_f');
        if(pool.length) return pool[Math.floor(Math.random()*pool.length)];
        if(TEX['knicks']) return 'knicks';
        return 'blue';
    }
    function makeAlly(x,z){
        const atlasName = pickKnicksAtlas();
        // tune per-character stats: heavy is tankier+slower, fighter is quicker+lighter
        let hp=65, speed=7.0, dmg=11, reach=3.2;
        if(atlasName==='heavy_bball'){ hp=110; speed=5.4; dmg=15; reach=3.4; }
        else if(atlasName==='fighter_f'){ hp=70; speed=8.2; dmg=12; reach=3.4; }
        const a = new Character(x,z,{
            team:'ally', atlas:atlasName, anims:ENEMY_ANIMS,
            hp, speed, dmg, reach,
        });
        // No dedicated recruit sprite? Tint the silhouette/body orange so allies read
        // as a different "side" even when sharing the blue atlas.
        const isRecruitSprite = (atlasName==='heavy_bball' || atlasName==='fighter_f' || atlasName.startsWith('knicks'));
        if(!isRecruitSprite){
            a.silMat.color.setHex(0xff7a1c);   // Knicks orange outline
            a.mat.color.setHex(0xffd24a);      // warm body tint until real sprite lands
            a._knicksTint = true;
            // re-apply tint after the hit-flash setTimeout restores white
            a._restoreTint = ()=>{ if(a.state==='alive'){ a.mat.color.setHex(0xffd24a); a.silMat.color.setHex(0xff7a1c); } };
        }
        // little welcome ring at their feet
        const ring=new THREE.Mesh(new THREE.RingGeometry(0.4,0.9,24),
            new THREE.MeshBasicMaterial({color:0xff7a1c, transparent:true, side:THREE.DoubleSide, depthWrite:false}));
        ring.rotation.x=-Math.PI/2; ring.position.set(x,0.06,z);
        ring.userData={kind:'ultring', life:0.5, max:0.5, target:3};
        scene.add(ring); STATE.fx.push(ring);
        return a;
    }

    // Defer ally spawn slightly so the death anim plays out cleanly first.
    function scheduleRecruit(x,z){
        // confetti burst
        for(let i=0;i<10;i++){
            const m=new THREE.Mesh(new THREE.PlaneGeometry(0.4,0.4),
                new THREE.MeshBasicMaterial({color:i%2?0x2f6fd6:0xff7a1c, transparent:true, side:THREE.DoubleSide, depthWrite:false}));
            m.position.set(x+(Math.random()-.5)*1.4, 0.4+Math.random()*0.6, z+(Math.random()-.5)*1.4);
            const ang=Math.random()*Math.PI*2;
            m.userData={kind:'spark', vx:Math.cos(ang)*3, vy:3+Math.random()*2, vz:Math.sin(ang)*3, life:0.55, max:0.55, spin:(Math.random()-.5)*10};
            scene.add(m); STATE.fx.push(m);
        }
        setTimeout(()=>{
            if(!STATE.running) return;
            const liveAllies = STATE.entities.filter(e=>e.team==='ally'&&e.state==='alive').length;
            if(liveAllies >= (STATE.stats.allyCap||3)){
                // ally cap reached — recruit converts to bonus XP instead
                if(typeof awardXP==='function') awardXP(8);
                spawnDamageNumber(x, 2.0, z, '+8 XP', 'heal');
                return;
            }
            makeAlly(x,z);
            showComboPop('NEW YORK STAND UP!');
            playSfx('parry');
        }, 320);
    }

    // Virtual joystick
    (()=>{
        const base=document.getElementById('joy-base'), knob=document.getElementById('joy-knob');
        if(!base) return;
        let id=null, cx=0, cy=0; const R=52;
        const start=(x,y)=>{ const r=base.getBoundingClientRect(); cx=r.left+r.width/2; cy=r.top+r.height/2; STATE.joy.active=true; move(x,y); };
        const move=(x,y)=>{ let dx=x-cx, dy=y-cy; const d=Math.hypot(dx,dy)||1; const cl=Math.min(d,R); dx=dx/d*cl; dy=dy/d*cl; knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; STATE.joy.x=dx/R; STATE.joy.y=dy/R; };
        const end=()=>{ STATE.joy.active=false; STATE.joy.x=0; STATE.joy.y=0; knob.style.transform='translate(-50%,-50%)'; };
        base.addEventListener('touchstart',e=>{e.preventDefault(); const t=e.changedTouches[0]; id=t.identifier; start(t.clientX,t.clientY); hideHint();},{passive:false});
        base.addEventListener('touchmove',e=>{e.preventDefault(); for(const t of e.changedTouches){ if(t.identifier===id){ move(t.clientX,t.clientY); } }},{passive:false});
        base.addEventListener('touchend',e=>{ for(const t of e.changedTouches){ if(t.identifier===id){ id=null; end(); } }});
        // mouse fallback
        base.addEventListener('mousedown',e=>{ start(e.clientX,e.clientY); const mm=ev=>move(ev.clientX,ev.clientY); const mu=()=>{ end(); removeEventListener('mousemove',mm); removeEventListener('mouseup',mu); }; addEventListener('mousemove',mm); addEventListener('mouseup',mu); });
    })();

    function clearWorld(){

        STATE.fx.forEach(f=>scene.remove(f));
        STATE.projectiles.forEach(p=>scene.remove(p.mesh));
        AMBIENT.birds.forEach(b=>scene.remove(b));
        AMBIENT.cars.forEach(c=>scene.remove(c));
        for(const [,c] of STATE.activeChunks) scene.remove(c);
        STATE.entities=[]; STATE.pickups=[]; STATE.fx=[]; STATE.projectiles=[]; STATE.activeChunks.clear();
        STATE.lights=[]; STATE.pedSignals=[]; STATE.intersections.clear(); STATE.fadedBuildings.clear();

    }

        document.getElementById('restart-btn').classList.add('hidden');
        clearWorld();

        STATE.special=0; STATE.hitStop=0; STATE.shake.amp=0; STATE.shake.t=0;

        camera.zoom=1; camera.updateProjectionMatrix();
        // honour current chosen skin on restart
        const atlas = (STATE.chosenSkin && STATE.chosenSkin!=='hero') ? STATE.chosenSkin : 'hero';
        const anims = (atlas==='hero') ? HERO_ANIMS : ENEMY_ANIMS;
        STATE.player = new Character(0, CHUNK_SIZE/2, {
            team:'player', atlas, anims,
            hp:100+STATE.stats.hpBonus, speed:11, dmg:16+STATE.stats.dmgBonus,

        STATE.started = true;
        document.getElementById('pause-btn').classList.add('show');
        startWaveObjective();
        hintHidden=false; const h=document.getElementById('hint'); h.style.opacity=1;
        // Snap camera into position behind the player immediately so we don't
        // get a brief "looking at the side of a building" view while the
        // per-frame lerp is still settling.
        const _px = STATE.player.mesh.position.x;
        const _pz = STATE.player.mesh.position.z;
        camera.position.x = _px + Math.cos(STATE.cameraAngle)*camDist;
        camera.position.z = _pz + Math.sin(STATE.cameraAngle)*camDist;
        camera.position.y = 24;
        camera.lookAt(_px, 0, _pz);
    }
    document.getElementById('restart-btn').addEventListener('click',restartGame);
    document.getElementById('restart-btn').addEventListener('touchstart',e=>{e.preventDefault();restartGame();},{passive:false});

    // ============================================================
    //  GAME LOOP
    // ============================================================
    const clock=new THREE.Clock();
    const camDist=30;
    function gameLoop(){
        requestAnimationFrame(gameLoop);
        const realDt = Math.min(clock.getDelta(),0.05);
        if(STATE.hitStop>0) STATE.hitStop -= realDt;
        // Pause and pre-start: don't advance gameplay clock, but keep rendering.
        if(STATE.paused || !STATE.started){
            drawMinimap();
            renderer.render(scene,camera);
            return;
        }
        const dt = STATE.hitStop>0 ? realDt*0.06 : realDt;

        // camera rotate (uses scaled dt so hit-stop slows pan too)
        if(STATE.keys.q) STATE.cameraAngle+=1.8*dt;
        if(STATE.keys.e) STATE.cameraAngle-=1.8*dt;

        // pickups float
        STATE.pickups.forEach(p=>{ p.mesh.rotation.y+=2*dt; p.mesh.position.y=1.1+Math.sin(Date.now()*0.004+p.mesh.position.x)*0.25; });
        updateProjectiles(dt);

        if(STATE.player && STATE.player.state==='alive' && STATE.running){
            const p=STATE.player;
            // camera-relative movement
            const camF=new THREE.Vector3(); camera.getWorldDirection(camF); camF.y=0; camF.normalize();
            const camR=new THREE.Vector3(-camF.z,0,camF.x).normalize();
            const mv=new THREE.Vector3();
            if(STATE.keys.w) mv.add(camF);
            if(STATE.keys.s) mv.sub(camF);
            if(STATE.keys.a) mv.sub(camR);
            if(STATE.keys.d) mv.add(camR);
            // joystick
            if(STATE.joy.active && (Math.abs(STATE.joy.x)>0.12||Math.abs(STATE.joy.y)>0.12)){
                mv.add(camR.clone().multiplyScalar(STATE.joy.x));
                mv.add(camF.clone().multiplyScalar(-STATE.joy.y));
            }

            // -- combat actions --
            // Block (hold)
            if(STATE.keys.block){ p.startBlock(); } else { if(p.blocking) p.endBlock(); }
            if(p.blocking) p.blockStart += dt;

            // Dodge (one-shot)
            if(STATE.pressed.dodge){ p.dodge(mv); STATE.pressed.dodge=false; hideHint(); }
            // Ultimate
            if(STATE.pressed.ult){ p.unleashUltimate(); STATE.pressed.ult=false; hideHint(); }
            // Heavy (one-shot)
            if(STATE.pressed.heavy){ p.attack('heavy'); STATE.pressed.heavy=false; hideHint(); }
            // Throw nearby enemy, pickup, or a quick street item.
            if(STATE.pressed.throw){ p.throwAction(); STATE.pressed.throw=false; hideHint(); }
            // Light: pressing OR holding triggers when cooldown is up
            if(STATE.pressed.light || STATE.keys.light || STATE.keys.space){
                p.attack('light'); STATE.pressed.light=false; hideHint();
            }

            // movement (dodge burst overrides input)
            if(p.dodgeTime>0 && p.dodgeVel){
                const dv = p.dodgeVel;
                const nx=p.mesh.position.x + dv.x*dt;
                const nz=p.mesh.position.z + dv.z*dt;
                if(!checkCollision(nx,p.mesh.position.z,0.6)) p.mesh.position.x=nx;
                if(!checkCollision(p.mesh.position.x,nz,0.6)) p.mesh.position.z=nz;
                p.faceTo(p.mesh.position.x+dv.x, p.mesh.position.z+dv.z);
                if(!p.locked) p.play('run');
            } else if(mv.lengthSq()>0.001 && !p.locked && !p.blocking){
                mv.normalize();
                const moveScale = (STATE.powerups.speed>0) ? 1.5 : 1.0;
                const nx=p.mesh.position.x+mv.x*p.speed*moveScale*dt;
                const nz=p.mesh.position.z+mv.z*p.speed*moveScale*dt;
                if(!checkCollision(nx,p.mesh.position.z,0.6)) p.mesh.position.x=nx;
                if(!checkCollision(p.mesh.position.x,nz,0.6)) p.mesh.position.z=nz;
                p.faceTo(p.mesh.position.x+mv.x, p.mesh.position.z+mv.z);
                if(!p.locked) p.play('run');
                hideHint();
            } else if(p.blocking && mv.lengthSq()>0.001){
                // half-speed shuffle while blocking, no facing change (face hold)
                mv.normalize();
                const nx=p.mesh.position.x+mv.x*p.speed*0.45*dt;
                const nz=p.mesh.position.z+mv.z*p.speed*0.45*dt;
                if(!checkCollision(nx,p.mesh.position.z,0.6)) p.mesh.position.x=nx;
                if(!checkCollision(p.mesh.position.x,nz,0.6)) p.mesh.position.z=nz;
                if(!p.locked) p.play('idle');
            } else if(!p.locked){
                p.play('idle');
            }

            // pickups (weapon swap + world powerups)
            for(let i=STATE.pickups.length-1;i>=0;i--){
                const pk=STATE.pickups[i];
                if(p.mesh.position.distanceTo(pk.mesh.position)<1.7){
                    if(pk.isWorldPickup){
                        applyPowerup(pk.kind);
                    } else {
                        p.weapon=pk.type; setWeaponUI();
                    }
                    scene.remove(pk.mesh); STATE.pickups.splice(i,1);
                    spawnHit(pk.mesh.position.x,1.2,pk.mesh.position.z);
                }
            }
            // landmark proximity = wave completion
            if(STATE.objective && STATE.objective.kind==='reach' && STATE.landmark){
                const dx=STATE.landmark.position.x - p.mesh.position.x;
                const dz=STATE.landmark.position.z - p.mesh.position.z;
                if(dx*dx+dz*dz < 2.6*2.6){
                    STATE.objective.progress = 1;
                    completeWaveObjective();
                }
                STATE.landmark.userData.halo.rotation.z += dt*0.8;
            }
            // power-up timers
            if(STATE.powerups.rage>0){ STATE.powerups.rage = Math.max(0, STATE.powerups.rage - dt); }
            if(STATE.powerups.speed>0){ STATE.powerups.speed = Math.max(0, STATE.powerups.speed - dt); }
            updatePowerupHUD();
            updateBossHealthUI();

            // camera follow on orbit (+ screen shake)
            const tx=p.mesh.position.x+Math.cos(STATE.cameraAngle)*camDist;
            const tz=p.mesh.position.z+Math.sin(STATE.cameraAngle)*camDist;
            camera.position.x+=(tx-camera.position.x)*0.12;
            camera.position.z+=(tz-camera.position.z)*0.12;
            camera.position.y=24;
            // screen shake
            if(STATE.shake.t>0){
                STATE.shake.t -= realDt;
                const k = Math.max(0, STATE.shake.t) / Math.max(0.01, STATE.shake.dur);
                const sx = (Math.random()-0.5)*STATE.shake.amp*k;
                const sz = (Math.random()-0.5)*STATE.shake.amp*k;
                camera.position.x += sx;
                camera.position.z += sz;
                if(STATE.shake.t<=0){ STATE.shake.amp=0; }
            }
            camera.lookAt(p.mesh.position.x,1.5,p.mesh.position.z);
            dirLight.position.set(p.mesh.position.x+28,40,p.mesh.position.z+18);
            dirLight.target.position.set(p.mesh.position.x,0,p.mesh.position.z);

            updateEndlessCity();
            updateBuildingFade();
            handleSpawning(dt);
        } else if(STATE.player){
            // keep camera aimed even when dead
            camera.lookAt(STATE.player.mesh.position.x,1.5,STATE.player.mesh.position.z);
        }

        // attack resolution + AI + animation + billboard
        for(const e of STATE.entities){
            if(e.attackCooldown>0) e.attackCooldown-=dt;
            if(e.throwCooldown>0) e.throwCooldown-=dt;
            // combat state ticks
            if(e.invuln>0) e.invuln -= dt;
            if(e.dodgeCool>0) e.dodgeCool -= dt;
            if(e.dodgeTime>0){
                e.dodgeTime -= dt;
                if(e.dodgeTime<=0){ e.dodgeVel=null; }
            }
            if(e.stunTimer>0) e.stunTimer -= dt;
            if(e.comboTimer>0){
                e.comboTimer -= dt;
                if(e.comboTimer<=0){ e.comboHits=0; if(e===STATE.player) updateComboHUD(); }
            }
            if(e.attackLungeTime>0 && e.attackLungeVel){
                const lx=e.attackLungeVel.x*dt, lz=e.attackLungeVel.z*dt;
                if(!checkCollision(e.mesh.position.x+lx,e.mesh.position.z,0.6)) e.mesh.position.x += lx;
                if(!checkCollision(e.mesh.position.x,e.mesh.position.z+lz,0.6)) e.mesh.position.z += lz;
                e.attackLungeTime -= dt;
                if(e.attackLungeTime<=0) e.attackLungeVel=null;
            }
            // airborne physics (car-launch arc) — runs before flat-ground knockback
            if(e.airborne && e.airVel){
                const g = 22;   // gravity m/s^2
                e.airVel.y -= g*dt;
                e.mesh.position.x += e.airVel.x * dt;
                e.mesh.position.z += e.airVel.z * dt;
                e.mesh.position.y += e.airVel.y * dt;
                // tumble — spin the whole mesh group (sprite billboard re-aligns to camera
                // each frame so the visual spin comes from a per-frame z-axis kick on the sprite).
                if(e.sprite){ e.sprite.rotation.z = (e.sprite.rotation.z||0) + (e.tumbleSpin||0)*dt; }
                // drag in x/z
                e.airVel.x *= 0.985; e.airVel.z *= 0.985;
                if(e.team==='enemy' && e._thrownHits){
                    for(const o of STATE.entities){
                        if(o===e || o.state!=='alive' || o.team!=='enemy' || e._thrownHits.has(o)) continue;
                        const dx=o.mesh.position.x-e.mesh.position.x, dz=o.mesh.position.z-e.mesh.position.z;
                        if(dx*dx+dz*dz<1.7*1.7){
                            const d=new THREE.Vector3(e.airVel.x,0,e.airVel.z); if(d.lengthSq()>0.001) d.normalize();
                            o.takeDamage(16, d, {kb:1.6, flavor:'big'});
                            e._thrownHits.add(o);
                            e.airVel.x*=0.7; e.airVel.z*=0.7;
                            spawnHit(o.mesh.position.x,1.5,o.mesh.position.z,true);
                            triggerShake(0.7,0.16); playSfx('hit');
                            break;
                        }
                    }
                }
                if(e.mesh.position.y <= 0){
                    // land — small bounce on the first impact, then settle
                    if(e.airVel.y < -3 && (e._bounceCount||0)<1){
                        e.mesh.position.y = 0;
                        e.airVel.y = -e.airVel.y * 0.35;     // small rebound
                        e.airVel.x *= 0.55; e.airVel.z *= 0.55;
                        e._bounceCount = (e._bounceCount||0)+1;
                        triggerShake(0.6,0.12);
                        spawnHit(e.mesh.position.x, 0.4, e.mesh.position.z, false);
                    } else {
                        e.mesh.position.y = 0;
                        e.airborne = false;
                        e.airVel = null;
                        e._bounceCount = 0;
                        e._thrownHits = null;
                        if(e.sprite) e.sprite.rotation.z = 0;
                        // extra hit-stun on landing so a hit pedestrian doesn't pop right back up
                        if(e.team!=='player') e.stunTimer = Math.max(e.stunTimer, 0.6);
                    }
                }
            }
            // knockback travel
            if(e.kbTime>0 && e.kbVel && !e.airborne){
                const kx=e.kbVel.x*dt, kz=e.kbVel.z*dt;
                if(!checkCollision(e.mesh.position.x+kx, e.mesh.position.z, 0.6)) e.mesh.position.x += kx;
                if(!checkCollision(e.mesh.position.x, e.mesh.position.z+kz, 0.6)) e.mesh.position.z += kz;
                // chain damage: another live enemy in the knockback path eats a small hit
                if(e.team==='enemy'){
                    for(const o of STATE.entities){
                        if(o===e||o.state!=='alive'||o.team!=='enemy') continue;
                        const dx=o.mesh.position.x-e.mesh.position.x, dz=o.mesh.position.z-e.mesh.position.z;
                        if(dx*dx+dz*dz<1.4*1.4){
                            o.takeDamage(8, new THREE.Vector3(kx,0,kz).normalize(), {kb:0.7, flavor:'normal'});
                            e.kbVel.multiplyScalar(0.55);
                            break;
                        }
                    }
                }
                e.kbVel.multiplyScalar(0.85);
                e.kbTime -= dt;
                if(e.kbTime<=0){ e.kbVel=null; }
            }
            if(e!==STATE.player && e.stunTimer<=0) e.updateAI(dt);
            e.resolveHit();
            e.animate(dt);
            // Every animation cell draws the figure at the same scale, so hold one
            // consistent sprite size for all actions (no per-attack rescale, which
            // made the swing pop bigger then the lunge frame read smaller). Lerp so a
            // captain larger _baseSpriteMul still eases in on spawn.
            const animMul = (e.anims && e.anims[e.anim] && e.anims[e.anim].mul) || 1.0;
            const targetMul = (e._baseSpriteMul || 1.0) * animMul;
            e._curSpriteMul = e._curSpriteMul + (targetMul - e._curSpriteMul) * Math.min(1, dt*16);
            e.sprite.scale.setScalar(e._curSpriteMul);
            // keep feet planted on the ground even when the sprite scales up
            e.sprite.position.y = SPRITE_SCALE/2 * e._curSpriteMul;

            // billboard sprite to face camera, then add any tumble roll on top
            e.sprite.rotation.set(0,0,0);
            e.sprite.quaternion.copy(camera.quaternion);
            if(e.airborne){
                e._tumbleAngle = (e._tumbleAngle||0) + (e.tumbleSpin||0)*dt;
                // local +Z faces the camera after billboarding, so a Z-axis multiply
                // is a screen-plane roll — exactly what a tumble should look like.
                const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), e._tumbleAngle);
                e.sprite.quaternion.multiply(q);
            } else if(e._tumbleAngle){
                e._tumbleAngle = 0;
            }
            // dead enemy / ally: clearly read as DEFEATED — darken, dim the white
            // silhouette, then fade sprite + silhouette together before removal.
            if(e.state==='dead'&&e.team!=='player'&&e._deathTimer!==undefined){
                e._deathTimer-=dt;
                e.mat.color.setHex(0x8a8a8a);
                e.silMat.color.setHex(0x3a3a3a);
                if(e._deathTimer<0.6){
                    const k=Math.max(0,e._deathTimer/0.6);
                    e.mat.opacity=k;
                    e.silMat.opacity=k;
                    e.shadowBlob.material.opacity=k*0.16;
                }
            }
        }

        // keep characters from overlapping / walking through each other
        separateEntities();

        // remove finished dead enemies — and convert them into Knicks-fan allies
        STATE.entities=STATE.entities.filter(e=>{
            if(e.team==='enemy'&&e.state==='dead'&&e._deathTimer!==undefined&&e._deathTimer<=0){
                const rx=e.mesh.position.x, rz=e.mesh.position.z;
                scene.remove(e.mesh);
                // Only recruit while the run is still active; otherwise we'd spawn
                // fans into a knocked-out game.
                if(STATE.running) scheduleRecruit(rx,rz);
                return false;
            }
            // also remove finished dead allies
            if(e.team==='ally'&&e.state==='dead'&&e._deathTimer!==undefined&&e._deathTimer<=0){
                scene.remove(e.mesh); return false;
            }
            return true;
        });

        // combo timeout
        if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0) comboCount=0; }

        updateFX(dt);
        updateAmbient(dt);
        drawMinimap();
        renderer.render(scene,camera);
    }

    function showOverlay(id, on){
        const el=document.getElementById(id);
        if(!el) return;
        if(on) el.classList.add('show'); else el.classList.remove('show');
    }
    function showToast(text, ms=2400){
        const t=document.getElementById('agb-toast');
        t.innerText=text; t.classList.add('show');
        clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'), ms);
    }
    function showTutorial(key, text){
        if(STATE.tutorial.shown.has(key)) return;
        STATE.tutorial.shown.add(key);
        showToast(text, 3600);
    }

    // ---- PROGRESSION ----
    function loadProgression(){
        try{
            const t=parseInt(localStorage.getItem('agb_totalXP')||'0',10);
            if(!isNaN(t)) STATE.totalXP=t;
            const u=localStorage.getItem('agb_unlocks');
            if(u){ for(const k of u.split(',')) if(k) STATE.unlocks.add(k); }
            const vol=parseFloat(localStorage.getItem('agb_volume')||'0.45');
            if(!isNaN(vol)) STATE.settings.volume=Math.max(0,Math.min(1,vol));
            const z=parseFloat(localStorage.getItem('agb_zoom')||'1.0');
            if(!isNaN(z)) STATE.settings.zoom=Math.max(0.6,Math.min(2.4,z));
        }catch(e){}
    }
    function saveProgression(){
        try{
            localStorage.setItem('agb_totalXP', STATE.totalXP);
            localStorage.setItem('agb_unlocks', Array.from(STATE.unlocks).join(','));
            localStorage.setItem('agb_volume', STATE.settings.volume);
            localStorage.setItem('agb_zoom', STATE.settings.zoom);
        }catch(e){}
    }
    function awardXP(amount){
        STATE.xp += amount; STATE.totalXP += amount;
        while(STATE.xp >= STATE.xpToNext){
            STATE.xp -= STATE.xpToNext;
            STATE.level += 1;
            STATE.xpToNext = Math.floor(50 + STATE.level*20);
            queueLevelUp();
        }
        // check unlocks
        if(STATE.totalXP>=300 && !STATE.unlocks.has('skin_red')){ STATE.unlocks.add('skin_red'); showToast('UNLOCKED: Red brawler skin'); }
        if(STATE.totalXP>=900 && !STATE.unlocks.has('skin_black')){ STATE.unlocks.add('skin_black'); showToast('UNLOCKED: Black brawler skin'); }
        if(STATE.totalXP>=2000 && !STATE.unlocks.has('skin_blue')){ STATE.unlocks.add('skin_blue'); showToast('UNLOCKED: Blue brawler skin'); }
        saveProgression();
    }

    // ---- LEVEL-UP PICKS ----

    let _levelUpQueue = 0;
    function queueLevelUp(){ _levelUpQueue += 1; }
    function showLevelUpIfQueued(waveCleared){
        if(_levelUpQueue<=0 && !waveCleared) return false;
        STATE.paused = true;
        const ov=document.getElementById('agb-levelup');
        document.getElementById('agb-lvl-title').innerText = waveCleared ? `WAVE ${STATE.wave} CLEAR` : `LEVEL ${STATE.level}`;
        document.getElementById('agb-lvl-sub').innerText = _levelUpQueue>0 ? `LEVEL UP — pick an upgrade` : `Press CONTINUE`;
        const picksEl=document.getElementById('agb-lvl-picks');
        picksEl.innerHTML='';
        if(_levelUpQueue>0){
            // pick 3 distinct random options
            const pool=[...LVL_PICKS];
            const opts=[];
            for(let i=0;i<3 && pool.length;i++){
                const idx=Math.floor(Math.random()*pool.length);
                opts.push(pool.splice(idx,1)[0]);
            }
            for(const opt of opts){
                const el=document.createElement('div'); el.className='agb-pick';
                el.innerHTML=`<div class="pname">${opt.name}</div><div class="pdesc">${opt.desc}</div>`;
                el.onclick=()=>{
                    opt.apply(STATE.player);
                    _levelUpQueue -= 1;
                    playSfx('parry');
                    if(_levelUpQueue>0) showLevelUpIfQueued(false);
                    else closeLevelUp();
                };
                picksEl.appendChild(el);
            }
            document.getElementById('agb-lvl-skip').style.display='none';
        } else {
            document.getElementById('agb-lvl-skip').style.display='inline-block';
            document.getElementById('agb-lvl-skip').onclick = closeLevelUp;
        }
        ov.classList.add('show');
        return true;
    }
    function closeLevelUp(){
        document.getElementById('agb-levelup').classList.remove('show');
        STATE.paused = false;
        nextWave();
    }

    // ---- OBJECTIVES ----
    function setObjective(o){
        STATE.objective = o;
        const el=document.getElementById('agb-obj');
        if(!o){ el.style.display='none'; return; }
        el.style.display='flex';
        document.getElementById('agb-obj-text').innerText = o.label;
        document.getElementById('agb-obj-fill').style.width = '0%';
    }
    function tickObjectiveProgress(){
        const o=STATE.objective; if(!o) return;
        const fill=document.getElementById('agb-obj-fill');
        const pct = Math.min(100, Math.round((o.progress/Math.max(1,o.target))*100));
        fill.style.width = pct+'%';
    }
    function completeWaveObjective(){
        if(!STATE.objective) return;
        const o = STATE.objective;
        STATE.objective = null;
        document.getElementById('agb-obj').style.display='none';
        // bonus XP for clearing the wave
        if(typeof awardXP==='function') awardXP(25 + STATE.wave*5);
        clearLandmark();
        STATE._captain = null;
        // open the level-up / continue card
        showLevelUpIfQueued(true);
    }
    function pickWaveObjective(wave){
        // every 8th wave = Hawks boss; every 4th = captain; every 5th = landmark; else clear-the-block
        if(wave%8===0) return {kind:'boss'};
        if(wave%4===0) return {kind:'captain'};
        if(wave%5===0) return {kind:'reach'};
        return {kind:'clear'};
    }
    function startWaveObjective(){
        const w=STATE.wave;
        const kind = pickWaveObjective(w);
        clearLandmark();
        if(kind.kind==='clear'){
            const target = 4 + Math.floor(w*1.2);
            setObjective({ kind:'clear', target, progress:0, label:`CLEAR THE BLOCK (0/${target})` });
            showTutorial('clear','Clear the block — defeat every enemy that spawns this wave.');
        } else if(kind.kind==='reach'){
            const lx = STATE.player.mesh.position.x + (Math.random()<.5?-1:1)*(70+Math.random()*30);
            const lz = STATE.player.mesh.position.z + (Math.random()<.5?-1:1)*(70+Math.random()*30);
            spawnLandmark(lx,lz);
            setObjective({ kind:'reach', target:1, progress:0, marker:{x:lx,z:lz}, label:`REACH THE LANDMARK` });
            showTutorial('reach','Get to the glowing marker on the map. Enemies will still try to stop you.');
        } else if(kind.kind==='boss'){
            // Hawks mascot boss — wave ends on boss kill
            setObjective({ kind:'boss', target:1, progress:0, label:`DEFEAT THE HAWKS MASCOT` });
            STATE._bossPending = true;
            showTutorial('boss','The Hawks mascot is here — it fires from range. Close in, dodge its shots, and take it down.');
        } else {
            // captain — wave ends on captain kill
            setObjective({ kind:'captain', target:1, progress:0, label:`DEFEAT THE TEAM CAPTAIN` });
            STATE._captainPending = true;
            showTutorial('captain','A team captain is leading this block. Take them down to clear the wave.');
        }
    }

    // ---- LANDMARK PROP ----
    function spawnLandmark(x,z){
        const g=new THREE.Group();
        // glowing pillar
        const pillar=new THREE.Mesh(new THREE.CylinderGeometry(.55,.7,5,12),
            new THREE.MeshToonMaterial({color:0xffd24a, emissive:0xff8a3d, emissiveIntensity:0.9}));
        pillar.position.y=2.5; pillar.castShadow=true; addOutline(pillar); g.add(pillar);
        const cap=new THREE.Mesh(new THREE.SphereGeometry(0.85,12,10),
            new THREE.MeshToonMaterial({color:0xffffff, emissive:0xffd24a, emissiveIntensity:1.2}));
        cap.position.y=5.5; g.add(cap);
        // ground halo
        const halo=new THREE.Mesh(new THREE.RingGeometry(1.4,2.4,32),
            new THREE.MeshBasicMaterial({color:0xffd24a, transparent:true, opacity:0.4, side:THREE.DoubleSide, depthWrite:false}));
        halo.rotation.x=-Math.PI/2; halo.position.y=0.06; g.add(halo);
        g.position.set(x,0,z);
        g.userData.isLandmark=true; g.userData.halo=halo;
        scene.add(g);
        STATE.landmark=g;
    }
    function clearLandmark(){
        if(STATE.landmark){ scene.remove(STATE.landmark); STATE.landmark=null; }
    }

    // ---- CAPTAIN (mid-boss) ----
    // Pool: existing generic captains (blue/red/black) plus the named mid-bosses
    // when their atlases are loaded. celtics_0 = strong+fast, sixers_21 = strong+slow.
    const CAPTAIN_PROFILES = [
        { atlas:null, label:'TEAM CAPTAIN',           hpMul:1.0, speedMul:1.0,  dmgMul:1.0, sizeMul:1.45, sil:0xffd24a },
        { atlas:'celtics_0', label:'TATUM (#0) — STRONG & FAST',
                                                      hpMul:1.25, speedMul:1.45, dmgMul:1.25, sizeMul:1.5,  sil:0x1aa05a, reachAdd:0.2 },
        { atlas:'sixers_21', label:'EMBIID (#21) — STRONG & SLOW',
                                                      hpMul:1.85, speedMul:0.75, dmgMul:1.55, sizeMul:1.75, sil:0x2f6fd6, reachAdd:0.4 },
    ];
    function spawnCaptain(){
        // pick among profiles that have a loaded atlas (the generic one is always eligible)
        const eligible = CAPTAIN_PROFILES.filter(p => p.atlas===null || TEX[p.atlas]);
        const prof = eligible[Math.floor(Math.random()*eligible.length)];
        const kind = prof.atlas || ENEMY_KINDS[Math.floor(Math.random()*ENEMY_KINDS.length)];
        const angle=Math.random()*Math.PI*2;
        const dist=22;
        let sx=STATE.player.mesh.position.x+Math.cos(angle)*dist;
        let sz=STATE.player.mesh.position.z+Math.sin(angle)*dist;
        let tries=0; while(checkCollision(sx,sz,0.9)&&tries++<6){ sx+=(Math.random()-.5)*6; sz+=(Math.random()-.5)*6; }
        const baseHp  = 240+STATE.wave*20;
        const baseSpd = 6.0+Math.random()*0.6;
        const baseDmg = 18+STATE.wave;
        const c=new Character(sx,sz,{
            team:'enemy', atlas:kind, anims:ENEMY_ANIMS,
            hp:  Math.round(baseHp * prof.hpMul),
            speed: baseSpd * prof.speedMul,
            dmg: Math.round(baseDmg * prof.dmgMul),
            reach: 3.8 + (prof.reachAdd||0),
        });
        c.isCaptain = true;
        c.maxHp = c.hp;
        c._baseSpriteMul = prof.sizeMul;
        c.shadowBlob.scale.setScalar(prof.sizeMul*0.97);
        c.silMat.color.setHex(prof.sil);
        STATE._captainPending = false;
        STATE._captain = c;
        showToast(prof.label, 2400);
        unstickFromColliders(c);
        return c;
    }

    // ---- HAWKS MASCOT BOSS ----
    function spawnBoss(){
        const angle=Math.random()*Math.PI*2;
        const dist=18;
        let sx=STATE.player.mesh.position.x+Math.cos(angle)*dist;
        let sz=STATE.player.mesh.position.z+Math.sin(angle)*dist;
        let tries=0; while(checkCollision(sx,sz,1.1)&&tries++<8){ sx+=(Math.random()-.5)*6; sz+=(Math.random()-.5)*6; }
        // prefer the v2 mascot if it's loaded; otherwise fall back to the original.
        const atlas = TEX['hawks_v2'] ? 'hawks_v2'
                   : TEX['hawks']     ? 'hawks'
                   : (TEX['black']?'black':'blue');
        const isHawks = (atlas==='hawks' || atlas==='hawks_v2');
        const c=new Character(sx,sz,{
            team:'enemy', atlas, anims:(isHawks?BOSS_ANIMS:ENEMY_ANIMS),
            // v2 is "ranged and aggressive": more reach, faster move, more damage
            hp:1100+STATE.wave*60,
            speed: atlas==='hawks_v2' ? 6.4 : 5.2,
            dmg:   atlas==='hawks_v2' ? 26+STATE.wave : 22+STATE.wave,
            reach: atlas==='hawks_v2' ? 5.2 : 4.0,
        });
        c.isBoss=true; c.maxHp=c.hp;
        c._baseSpriteMul=2.2;
        c.shadowBlob.scale.setScalar(2.1);
        c.silMat.color.setHex(0xff3838);
        c._aggressive = (atlas==='hawks_v2');   // marks AI for tighter chase / shorter attack cooldowns
        STATE._bossPending=false;
        STATE._boss=c;
        STATE._bossAddTimer = 0;                // timer for "hawks jersey adds" reinforcements
        updateBossHealthUI();
        showToast('THE HAWKS MASCOT HAS ARRIVED', 2400);
        unstickFromColliders(c);
        return c;
    }

    function nearestHostile(pos, radius){
        let best=null, bd=radius*radius;
        for(const o of STATE.entities){
            if(o.state!=='alive' || o.team!=='enemy') continue;
            const dx=o.mesh.position.x-pos.x, dz=o.mesh.position.z-pos.z;
            const d=dx*dx+dz*dz;
            if(d<bd){ best=o; bd=d; }
        }
        return best;
    }
    function makeThrowableMesh(kind){
        const g=new THREE.Group();
        const k=(kind||'boot').toString();
        if(k==='basketball' || k==='rage'){
            const ball=new THREE.Mesh(new THREE.SphereGeometry(.42,14,10),toon(0xe8721e,{emissive:0x331000,emissiveIntensity:.15})); addOutline(ball); g.add(ball);
            const seamMat=toon(0x2a1f17);
            const a=new THREE.Mesh(new THREE.TorusGeometry(.43,.018,6,24),seamMat); a.rotation.x=Math.PI/2; g.add(a);
            const b=new THREE.Mesh(new THREE.TorusGeometry(.43,.018,6,24),seamMat); b.rotation.y=Math.PI/2; g.add(b);
        } else if(k==='brick' || k==='street'){
            const brick=new THREE.Mesh(new THREE.BoxGeometry(.8,.38,.48),toon(0xb56a4f)); addOutline(brick); g.add(brick);
        } else if(k==='broom'){
            const stick=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,1.6,8),toon(0xcaa46a)); stick.rotation.z=Math.PI/2.8; addOutline(stick); g.add(stick);
            const br=new THREE.Mesh(new THREE.ConeGeometry(.32,.7,10),toon(0xd9a23a)); br.position.x=.65; br.rotation.z=-Math.PI/2.8; addOutline(br); g.add(br);
        } else if(k==='belt'){
            const strap=new THREE.Mesh(new THREE.TorusGeometry(.45,.08,8,20),toon(0x8b5a2b)); addOutline(strap); g.add(strap);
            const buckle=new THREE.Mesh(new THREE.BoxGeometry(.28,.24,.14),toon(0xd9c44a)); buckle.position.x=.45; g.add(buckle);
        } else {
            const sole=new THREE.Mesh(new THREE.BoxGeometry(.78,.24,.38),toon(0x234a9f)); sole.position.y=-.08; addOutline(sole); g.add(sole);
            const toe=new THREE.Mesh(new THREE.SphereGeometry(.28,10,8),toon(0xffffff)); toe.scale.set(1.25,.55,.75); toe.position.x=.32; addOutline(toe); g.add(toe);
            const cuff=new THREE.Mesh(new THREE.BoxGeometry(.35,.42,.34),toon(0xe8721e)); cuff.position.set(-.28,.22,0); addOutline(cuff); g.add(cuff);
        }
        g.scale.set(1.35,1.35,1.35);
        return g;
    }
    function spawnThrownProjectile(owner, kind, start, dir){
        const mesh=makeThrowableMesh(kind);
        mesh.position.set(start.x, Math.max(1.25,start.y||1.25), start.z);
        scene.add(mesh);
        const speed = (kind==='brick'||kind==='street') ? 19 : 23;
        STATE.projectiles.push({owner, kind, mesh, vel:dir.clone().multiplyScalar(speed), age:0, life:1.15, dmg:(kind==='brick'||kind==='street')?28:22, hit:new Set()});
    }
    function updateProjectiles(dt){
        STATE.projectiles=STATE.projectiles.filter(pr=>{
            pr.age += dt; pr.life -= dt;
            pr.mesh.position.x += pr.vel.x*dt;
            pr.mesh.position.z += pr.vel.z*dt;
            pr.mesh.position.y = 1.45 + Math.sin(Math.min(1,pr.age/1.15)*Math.PI)*1.4;
            pr.mesh.rotation.x += dt*9; pr.mesh.rotation.y += dt*12; pr.mesh.rotation.z += dt*7;
            let hit=false;
            for(const o of STATE.entities){
                if(o.state!=='alive' || !isHostile(pr.owner,o) || pr.hit.has(o)) continue;
                const dx=o.mesh.position.x-pr.mesh.position.x, dz=o.mesh.position.z-pr.mesh.position.z;
                if(dx*dx+dz*dz<1.35*1.35){
                    const dir=pr.vel.clone(); dir.y=0; if(dir.lengthSq()>0.001) dir.normalize();
                    o.takeDamage(pr.dmg, dir, {attacker:pr.owner, kb:2.2, flavor:'big'});
                    if(o.team!=='player'){
                        o.airborne=true; o.airVel=new THREE.Vector3(dir.x*10, 5.8, dir.z*10); o.tumbleSpin=10; o._bounceCount=0;
                    }
                    spawnHit(o.mesh.position.x, 1.7, o.mesh.position.z, true);
                    triggerShake(0.8,0.18); playSfx('hit');
                    pr.hit.add(o); hit=true; break;
                }
            }
            if(hit || pr.life<=0){ spawnHit(pr.mesh.position.x,1.2,pr.mesh.position.z,false); scene.remove(pr.mesh); return false; }
            return true;
        });
    }

    // ---- MINIMAP ----  throttled to every 4th frame
    let _miniFrame=0;
    function drawMinimap(){
        const ctx = STATE.minimapCtx; if(!ctx || !STATE.player) return;
        _miniFrame++;
        if((_miniFrame % 4) !== 0) return;
        const W=280, H=280;
        ctx.clearRect(0,0,W,H);
        // asphalt background
        ctx.fillStyle='#1a1108'; ctx.fillRect(0,0,W,H);
        // street grid (every CHUNK_SIZE)
        const scale = 1.5;   // pixels per world unit
        const px = STATE.player.mesh.position.x, pz = STATE.player.mesh.position.z;
        // grid lines at multiples of 40 (road centerlines)
        ctx.strokeStyle='rgba(120,108,68,.5)'; ctx.lineWidth=1;
        for(let off=-W/2; off<=W/2; off+=40*scale){
            const gx = Math.floor((px+off)/40)*40;
            const sx = (gx - px)*scale + W/2;
            ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx,H); ctx.stroke();
            const gz = Math.floor((pz+off)/40)*40;
            const sz = (gz - pz)*scale + H/2;
            ctx.beginPath(); ctx.moveTo(0,sz); ctx.lineTo(W,sz); ctx.stroke();
        }
        // entities
        for(const e of STATE.entities){
            if(e.state!=='alive') continue;
            const sx = (e.mesh.position.x - px)*scale + W/2;
            const sz = (e.mesh.position.z - pz)*scale + H/2;
            if(sx<0||sx>W||sz<0||sz>H) continue;
            if(e===STATE.player){
                // arrow points in the player's facing direction.
                // facing is atan2(dx,dz) (0 = +Z = south). On the minimap
                // +X is right, +Z is down — so the arrow tip vector is
                // (sin(facing), cos(facing)).
                const f = e.facing || 0;
                const ax = Math.sin(f), az = Math.cos(f);
                const tipLen = 11, baseHalf = 6;
                const tipX = sx + ax*tipLen,   tipY = sz + az*tipLen;
                const baseX = sx - ax*4,       baseY = sz - az*4;
                const leftX = baseX + -az*baseHalf, leftY = baseY + ax*baseHalf;
                const rightX = baseX +  az*baseHalf, rightY = baseY + -ax*baseHalf;
                ctx.fillStyle='#ffd24a';
                ctx.strokeStyle='#1a1108'; ctx.lineWidth=2; ctx.lineJoin='round';
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(leftX, leftY);
                ctx.lineTo(rightX, rightY);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            } else if(e.team==='enemy'){
                ctx.fillStyle = e.isCaptain ? '#ff3838' : '#e8721e';
                ctx.beginPath(); ctx.arc(sx,sz, e.isCaptain?5:3.5, 0,Math.PI*2); ctx.fill();
            } else if(e.team==='ally'){
                ctx.fillStyle='#2f6fd6';
                ctx.beginPath(); ctx.arc(sx,sz,3.5,0,Math.PI*2); ctx.fill();
            }
        }
        // landmark
        if(STATE.landmark){
            const sx = (STATE.landmark.position.x - px)*scale + W/2;
            const sz = (STATE.landmark.position.z - pz)*scale + H/2;
            const cx2 = Math.max(8, Math.min(W-8, sx));
            const cz2 = Math.max(8, Math.min(H-8, sz));
            // star
            ctx.fillStyle='#ffd24a';
            ctx.beginPath();
            for(let i=0;i<10;i++){
                const r = i%2===0 ? 8 : 4;
                const a = -Math.PI/2 + i*Math.PI/5;
                const x = cx2 + Math.cos(a)*r, y = cz2 + Math.sin(a)*r;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle='#1a1108'; ctx.lineWidth=2; ctx.stroke();
        }
        // border + corner label
        ctx.strokeStyle='#ffd24a'; ctx.lineWidth=4; ctx.strokeRect(0,0,W,H);
        ctx.fillStyle='#ffd24a'; ctx.font='900 14px Trebuchet MS,sans-serif';
        ctx.fillText('MAP', 8, 18);
    }

    // ---- TITLE / CHARACTER SELECT ----
    // Showcases the hero on the title screen, cycling through every animation.
    const TITLE_ANIM_SEQ = ['broom'];
    const TITLE_ANIM_HOLD = 1.6;
    function titleSpriteLoop(){
        if(!STATE.titleSpriteActive) return;
        const cv = document.getElementById('agb-title-sprite');
        if(!cv){ requestAnimationFrame(titleSpriteLoop); return; }
        const ctx = cv.getContext('2d');
        const entry = TEX['hero'];
        if(!entry || !entry.texture || !entry.texture.image){ requestAnimationFrame(titleSpriteLoop); return; }
        const img = entry.texture.image;
        const CELL_PX = img.width / entry.cols;
        const t = performance.now() / 1000;
        const slot = Math.floor(t / TITLE_ANIM_HOLD);
        const name = TITLE_ANIM_SEQ[slot % TITLE_ANIM_SEQ.length];
        const a = HERO_ANIMS[name];
        const local = t - slot * TITLE_ANIM_HOLD;
        const frame = a.loop ? Math.floor(t * a.fps) % a.len
                             : Math.min(a.len - 1, Math.floor(local * a.fps));
        ctx.clearRect(0, 0, cv.width, cv.height);
        ctx.drawImage(img, (a.col + frame) * CELL_PX, 0, CELL_PX, CELL_PX, 0, 0, cv.width, cv.height);
        requestAnimationFrame(titleSpriteLoop);
    }

    // ---- BOOT ----
    async function boot(){
        const tasks=[
            loadAtlas('blue', _asset(SPRITE_DATA.blue)),
            loadAtlas('red',  _asset(SPRITE_DATA.red)),
            loadAtlas('black',_asset(SPRITE_DATA.black)),
            loadAtlas('hero', _asset(SPRITE_DATA.hero)),
        ];
        // (knicks atlas removed — heavy_bball + fighter_f are the real recruits now,
        //  and the old knicks art had per-row vertical misalignment that produced the
        //  cross-cell "bleeding" visible in the sprite lab.)
        // (old 'hawks' atlas dropped — hawks_v2 in NEW_ROLE_ATLASES is the canonical
        //  boss now. SPRITE_DATA.hawks entry stays so the file still resolves but
        //  it doesn't get loaded into TEX and won't appear in Sprite Lab.)
        // ---- new role atlases — try to load if present, silently skip if missing.
        //   celtics_0 / sixers_21 → mid-boss captains
        //   hawks_v2              → main boss (replaces 'hawks' when available)
        //   heavy_bball / fighter_f → recruited allies
        const NEW_ROLE_ATLASES = {
            celtics_0:  'away_game_brawler_assets/character_atlases/celtics_0.png',
            sixers_21:  'away_game_brawler_assets/character_atlases/sixers_21.png',
            hawks_v2:   'away_game_brawler_assets/character_atlases/hawks_v2.png',
            heavy_bball:'away_game_brawler_assets/character_atlases/heavy_bball.png',
            fighter_f:  'away_game_brawler_assets/character_atlases/fighter_f.png',
        };
        for(const [n,u] of Object.entries(NEW_ROLE_ATLASES)) tasks.push(loadAtlas(n, _asset(u)));
        await Promise.all(tasks);
        // ---- ESSENTIAL-atlas gate ----
        // The game cannot create a player or any enemies without these. If any
        // failed (mobile network glitch, CDN hiccup), show a recoverable error
        // overlay instead of proceeding and crashing on first Character() call.
        const ESSENTIAL = ['hero','blue','red','black'];
        const missing = ESSENTIAL.filter(n => !TEX[n]);
        if(missing.length){
            const loader = document.getElementById('loader');
            loader.innerHTML = `
                <div style="text-align:center; padding:20px; max-width:90vw;">
                    <div style="font-weight:900; color:#ffd24a; margin-bottom:12px; font-size:18px;">⚠️ Assets failed to load</div>
                    <div style="font-size:13px; color:#fff8e1; line-height:1.5; margin-bottom:14px;">Missing: <b>${missing.join(', ')}</b><br>This is usually a flaky connection. Tap retry below.</div>
                    <button id="agb-retry" style="background:linear-gradient(180deg,#ff8a3d,#d6402c);color:#fff;border:3px solid #1a1108;border-radius:999px;padding:10px 22px;font-weight:900;letter-spacing:1.5px;font-size:14px;box-shadow:0 4px 0 #1a1108;cursor:pointer;">RETRY</button>
                </div>`;
            document.getElementById('agb-retry').addEventListener('click', () => location.reload());
            return;   // bail out of boot — no game until retry succeeds
        }
        document.getElementById('loader').style.display='none';
        // load persistent best + progression
        try{ const b=parseInt(localStorage.getItem('agb_best')||'0',10); if(!isNaN(b)){ STATE.best=b; document.getElementById('best').innerText=b; } }catch(e){}
        loadProgression();
        // apply saved settings
        if(SFX.master) SFX.master.gain.value = STATE.settings.volume; else SFX.vol = STATE.settings.volume;
        camera.zoom = STATE.settings.zoom; camera.updateProjectionMatrix();
        // Title sprite animation loop
        STATE.titleSpriteActive = true;
        titleSpriteLoop();
        // World origin sits inside the sealed interior of chunk(0,0). Spawn on
        // the chunk-border road right next to it instead.
        STATE.player=makeHero(0, CHUNK_SIZE/2);
        setWeaponUI(); updateHealthUI(); updateSpecialUI();
        updateEndlessCity();
        STATE.running=true;
        clock.start();
        gameLoop();
    }

    (function devMenu(){
        // --- extra atlases that exist on disk but aren't wired into gameplay yet,
        //     exposed in the Sprite Lab so new art can be QA'd before integration. ---
        const EXTRA_ATLASES = {
            rusher:    'away_game_brawler_assets/character_atlases/rusher_archetype.png',
            thrower:   'away_game_brawler_assets/character_atlases/thrower_archetype.png',
            heavy:     'away_game_brawler_assets/character_atlases/heavy_archetype.png',
            ped_hoodie:'away_game_brawler_assets/character_atlases/pedestrian_hoodie.png',
            ped_jacket:'away_game_brawler_assets/character_atlases/pedestrian_jacket.png',
            cap_blue:  'away_game_brawler_assets/character_atlases/captain_blue.png',
            cap_red:   'away_game_brawler_assets/character_atlases/captain_red.png',
            cap_black: 'away_game_brawler_assets/character_atlases/captain_black.png',
            // ---- NEW preview atlases (combine the per-anim sheets in
            //     away_game_brawler_assets/New Characters Input/ into one PNG each
            //     at the paths below, then hit "Load all extra atlases"). ----
            celtics_0:  'away_game_brawler_assets/character_atlases/celtics_0.png',     // green jersey #0, bearded
            hawks_v2:   'away_game_brawler_assets/character_atlases/hawks_v2.png',      // red bird mascot refresh (bazooka)
            heavy_bball:'away_game_brawler_assets/character_atlases/heavy_bball.png',   // bald, blue tank, basketball belly
            sixers_21:  'away_game_brawler_assets/character_atlases/sixers_21.png',     // afro, blue #21
            fighter_f:  'away_game_brawler_assets/character_atlases/fighter_f.png',     // blue dress, ponytail, energy ball
        };

        // ---- styles ----
        const css = document.createElement('style');
        css.textContent = `
        #dev-btn{position:fixed;left:10px;bottom:10px;z-index:9998;font:700 11px system-ui;
            background:#1b1b22;color:#7ee0ff;border:1px solid #7ee0ff;border-radius:6px;
            padding:5px 9px;cursor:pointer;opacity:.6}
        #dev-btn:hover{opacity:1}
        #dev-panel{position:fixed;top:0;right:0;width:330px;max-height:100vh;overflow-y:auto;
            z-index:9999;background:rgba(16,16,22,.96);color:#e8e8ee;font:12px/1.35 system-ui;
            border-left:2px solid #7ee0ff;padding:10px 12px 40px;display:none;box-shadow:-6px 0 24px rgba(0,0,0,.5)}
        #dev-panel.show{display:block}
        #dev-panel h3{margin:12px 0 5px;font-size:12px;color:#7ee0ff;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #333;padding-bottom:3px}
        #dev-panel h3:first-child{margin-top:0}
        #dev-panel button{background:#262631;color:#e8e8ee;border:1px solid #444;border-radius:5px;
            padding:5px 7px;margin:2px 2px 0 0;cursor:pointer;font:600 11px system-ui}
        #dev-panel button:hover{background:#34343f;border-color:#7ee0ff}
        #dev-panel button.on{background:#1d5e2e;border-color:#5fd07a;color:#bff5c8}
        #dev-panel select,#dev-panel input[type=text]{background:#1b1b22;color:#e8e8ee;border:1px solid #444;border-radius:5px;padding:4px;font:11px system-ui;width:100%;margin:2px 0}
        #dev-panel .row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
        #dev-lab-dirs{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:6px}
        #dev-lab-dirs canvas{width:100%;background:#0c0c10;border:1px solid #333;border-radius:4px;image-rendering:pixelated}
        #dev-lab-dirs .dl{position:relative}
        #dev-lab-dirs .dl span{position:absolute;top:1px;left:3px;font:700 9px system-ui;color:#7ee0ff;text-shadow:0 0 3px #000}
        #dev-hint{color:#888;font-size:10px;margin-top:8px}
        `;
        document.head.appendChild(css);

        // ---- DOM ----
        const btn = document.createElement('div'); btn.id='dev-btn'; btn.textContent='DEV ` ';
        document.body.appendChild(btn);
        const panel = document.createElement('div'); panel.id='dev-panel';
        document.body.appendChild(panel);

        const ENEMY_PRESETS = ['blue','red','black'];
        function liveAtlases(){ return Object.keys(TEX); }

        function buildPanel(){
            const atlasOpts = liveAtlases();
            panel.innerHTML = `
            <h3>Spawn enemy</h3>
            <div class="row" id="dev-enemy-row"></div>
            <h3>Allies / Boss</h3>
            <div class="row">
              <button data-act="ally">+ Knicks ally</button>
              <button data-act="captain">+ Captain</button>
              <button data-act="boss">+ Boss (big)</button>
            </div>
            <h3>Pickups & power-ups</h3>
            <div class="row">
              <button data-act="pk-belt">Belt</button>
              <button data-act="pk-broom">Broom</button>
              <button data-act="pu-heal">Heal drink</button>
              <button data-act="pu-rage">Rage</button>
              <button data-act="pu-speed">Speed</button>
            </div>
            <h3>World cheats</h3>
            <div class="row">
              <button data-act="god" id="dev-god">God mode: OFF</button>
              <button data-act="heal">Heal me</button>
              <button data-act="ult">Fill ULT</button>
              <button data-act="xp">+100 XP</button>
              <button data-act="killall">Kill all</button>
              <button data-act="clearpk">Clear pickups</button>
              <button data-act="wave">Next wave</button>
              <button data-act="brawl">Force brawl start</button>
            </div>
            <h3>Sprite Lab</h3>
            <div class="row">
              <select id="dev-lab-atlas">${atlasOpts.map(a=>`<option>${a}</option>`).join('')}</select>
            </div>
            <div class="row">
              <select id="dev-lab-anim"></select>
            </div>
            <div class="row">
              <button data-act="lab-loadextra">Load all extra atlases</button>
              <button data-act="lab-refresh">Refresh list</button>
            </div>
            <div class="row" style="margin-top:4px">
              <input type="text" id="dev-lab-url" placeholder="custom atlas path (served under Desktop)">
            </div>
            <div class="row">
              <input type="text" id="dev-lab-name" placeholder="name" style="width:90px">
              <button data-act="lab-loadurl">Load atlas</button>
            </div>
            <div id="dev-lab-dirs"></div>
            <div id="dev-hint">Backtick (\`) toggles this panel. Rows in Sprite Lab = the 8 facings (S, SE, E, NE, N, NW, W, SW).</div>
            `;
            // enemy buttons (live atlases that look like enemy sheets + presets)
            const erow = panel.querySelector('#dev-enemy-row');
            const enemyList = Array.from(new Set([...ENEMY_PRESETS, ...atlasOpts.filter(a=>a!=='hero')]));
            erow.innerHTML = enemyList.map(a=>`<button data-act="enemy" data-atlas="${a}">+ ${a}</button>`).join('');
            panel.querySelector('#dev-god').classList.toggle('on', !!STATE.devGod);
            panel.querySelector('#dev-god').textContent = 'God mode: ' + (STATE.devGod?'ON':'OFF');
            wireLab();
        }

        // ---- spawning helpers ----
        function ringPos(dist){
            const p = STATE.player ? STATE.player.mesh.position : {x:0,z:CHUNK_SIZE/2};
            const a = Math.random()*Math.PI*2; const d = dist||8;
            return { x:p.x+Math.cos(a)*d, z:p.z+Math.sin(a)*d };
        }
        // Place items in front of the camera (lower-centre of screen) so they're
        // always visible. i/n spread several items across a short arc.
        let _spreadIdx=0;
        function frontPos(dist, spread){
            const p = STATE.player ? STATE.player.mesh.position : {x:0,z:CHUNK_SIZE/2};
            const d = dist||5;
            const base = STATE.cameraAngle;            // toward camera = bottom of screen
            const a = base + ((spread? (_spreadIdx++ %5 -2):0) * 0.32);
            return { x:p.x+Math.cos(a)*d, z:p.z+Math.sin(a)*d };
        }
        function devEnemy(atlas){
            if(!STATE.player) return;
            const pos=ringPos(9);
            const c=new Character(pos.x,pos.z,{
                team:'enemy', atlas, anims:(atlas==='hero'?HERO_ANIMS:ENEMY_ANIMS),
                hp:60+STATE.wave*6, speed:5.5+Math.random()*2, dmg:9+STATE.wave, reach:3.2,
            });
            STATE.brawlStarted=true; return c;
        }
        function devBoss(){
            if(!STATE.player) return;
            STATE.brawlStarted=true;
            return spawnBoss();
        }

        // ---- Sprite Lab ----
        let labRAF=null, labStart=0;
        function animMapFor(name){ return name==='hero' ? HERO_ANIMS : ENEMY_ANIMS; }
        function wireLab(){
            const aSel=panel.querySelector('#dev-lab-atlas');
            const anSel=panel.querySelector('#dev-lab-anim');
            const dirs=panel.querySelector('#dev-lab-dirs');
            function fillAnims(){
                const m=animMapFor(aSel.value);
                anSel.innerHTML = Object.keys(m).map(k=>`<option>${k}</option>`).join('') + '<option value="__all">(every column)</option>';
            }
            fillAnims();
            // 8 direction canvases
            const DIRNAMES=['S','SE','E','NE','N','NW','W','SW'];
            dirs.innerHTML = DIRNAMES.map((d,i)=>`<div class="dl"><span>${d}</span><canvas data-dir="${i}" width="96" height="96"></canvas></div>`).join('');
            aSel.onchange=()=>{ fillAnims(); };
            function draw(){
                const at=TEX[aSel.value]; if(!at){ labRAF=requestAnimationFrame(draw); return; }
                const img=at.texture.image; const cols=at.cols, rows=at.rows||ROWS;
                const animName=anSel.value;
                const t=(performance.now()-labStart)/1000;
                panel.querySelectorAll('#dev-lab-dirs canvas').forEach(cv=>{
                    const dir=Math.min(rows-1, +cv.dataset.dir);
                    const ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
                    ctx.clearRect(0,0,cv.width,cv.height);
                    let col, fps;
                    if(animName==='__all'){ const len=cols; fps=8; col=Math.floor(t*fps)%len; }
                    else { const a=animMapFor(aSel.value)[animName]; fps=a.fps; const f=Math.floor(t*fps)%a.len; col=a.col+f; }
                    if(img && img.complete!==false){
                        ctx.drawImage(img, col*CELL, dir*CELL, CELL, CELL, 0,0, cv.width, cv.height);
                    }
                });
                labRAF=requestAnimationFrame(draw);
            }
            if(labRAF) cancelAnimationFrame(labRAF);
            labStart=performance.now(); draw();
        }

        // ---- actions ----
        panel.addEventListener('click', (e)=>{
            const b=e.target.closest('button'); if(!b) return;
            const act=b.dataset.act;
            switch(act){
                case 'enemy': devEnemy(b.dataset.atlas); break;
                case 'ally': if(STATE.player){ const p=ringPos(6); makeAlly(p.x,p.z); } break;
                case 'captain': if(STATE.player){ spawnCaptain(); STATE.brawlStarted=true; } break;
                case 'boss': devBoss(); break;
                case 'pk-belt': if(STATE.player){ const p=frontPos(5,true); new Pickup(p.x,p.z,'belt'); } break;
                case 'pk-broom':if(STATE.player){ const p=frontPos(5,true); new Pickup(p.x,p.z,'broom'); } break;
                case 'pu-heal': if(STATE.player){ const p=frontPos(5,true); new WorldPickup(p.x,p.z,'heal'); } break;
                case 'pu-rage': if(STATE.player){ const p=frontPos(5,true); new WorldPickup(p.x,p.z,'rage'); } break;
                case 'pu-speed':if(STATE.player){ const p=frontPos(5,true); new WorldPickup(p.x,p.z,'speed'); } break;
                case 'god': STATE.devGod=!STATE.devGod; b.classList.toggle('on',STATE.devGod); b.textContent='God mode: '+(STATE.devGod?'ON':'OFF'); break;
                case 'heal': if(STATE.player){ STATE.player.hp=STATE.player.maxHp; updateHealthUI(); } break;
                case 'ult': gainSpecial(100); updateSpecialUI&&updateSpecialUI(); break;
                case 'xp': awardXP(100); break;
                case 'killall': STATE.entities.filter(en=>en.team==='enemy'&&en.state==='alive').forEach(en=>en.takeDamage(999999,new THREE.Vector3(0,0,1),{attacker:STATE.player})); break;
                case 'clearpk': STATE.pickups.slice().forEach(p=>{ scene.remove(p.mesh); }); STATE.pickups.length=0; break;
                case 'wave': if(typeof nextWave==='function') nextWave(); break;
                case 'brawl': STATE.brawlStarted=true; showToast('DEV: brawl started',1200); break;
                case 'lab-loadextra': {
                    const tasks=Object.entries(EXTRA_ATLASES).filter(([n])=>!TEX[n]).map(([n,u])=>loadAtlas(n,u));
                    Promise.all(tasks).then(()=>{ buildPanel(); showToast('DEV: extra atlases loaded',1400); });
                    break;
                }
                case 'lab-refresh': buildPanel(); break;
                case 'lab-loadurl': {
                    const url=panel.querySelector('#dev-lab-url').value.trim();
                    const nm=(panel.querySelector('#dev-lab-name').value.trim())||('custom'+Object.keys(TEX).length);
                    if(url){ loadAtlas(nm,url).then(()=>{ buildPanel(); showToast('DEV: loaded '+nm,1400); }); }
                    break;
                }
            }
        });

        function toggle(force){
            const show = force===undefined ? !panel.classList.contains('show') : force;
            if(show){ buildPanel(); panel.classList.add('show'); }
            else { panel.classList.remove('show'); if(labRAF){ cancelAnimationFrame(labRAF); labRAF=null; } }
        }
        btn.addEventListener('click',()=>toggle());
        addEventListener('keydown',(e)=>{
            if(e.key==='`' || e.key==='~'){
                if(/input|textarea|select/i.test((e.target.tagName||''))) return;
                e.preventDefault(); toggle();
            }
        });
        window.DEV = { toggle, devEnemy, devBoss };
        window.STATE = STATE;   // debug access
    })();

    boot();
    </script>
</body>
</html>
