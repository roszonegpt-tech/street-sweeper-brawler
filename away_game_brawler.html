<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Street Sweeper Brawler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
    <style>
        :root{
            --ink:#241a12;
            --paper:#fff7e6;
            --hud-blue:#2f6fd6;
            --hud-orange:#e8721e;
            --hud-gold:#ffd24a;
        }
        #agb-boss-hp{
            display:none; position:fixed; top:14px; left:50%; transform:translateX(-50%);
            z-index:90; width:min(560px,80vw); text-align:center; pointer-events:none;
            font-family:system-ui,sans-serif;
        }
        #agb-boss-hp .agb-boss-name{
            font-weight:800; font-size:15px; letter-spacing:.08em; color:#fff;
            text-shadow:0 2px 0 #7a1414, 0 0 8px rgba(255,40,40,.6); margin-bottom:4px;
        }
        #agb-boss-hp .agb-boss-track{
            height:16px; background:rgba(20,8,8,.78); border:2px solid #ffce4a;
            border-radius:9px; overflow:hidden; box-shadow:0 3px 12px rgba(0,0,0,.45);
        }
        #agb-boss-hp-fill{
            height:100%; width:100%;
            background:linear-gradient(90deg,#ff3838,#ff7a1c);
            transition:width .18s ease;
        }
        *{ box-sizing:border-box; }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #cdd3da;
            font-family: 'Trebuchet MS', 'Segoe UI', Tahoma, sans-serif;
            touch-action: none;
            -webkit-user-select:none; user-select:none;
        }
        canvas { display:block; }

        /* ---------- UI LAYER ---------- */
        #ui-layer {
            position: absolute; inset:0;
            pointer-events: none;
            display:flex; flex-direction:column; justify-content:space-between;
            padding: 14px;
        }
        .panel{
            background:rgba(28,20,14,.82);
            border:3px solid var(--paper);
            border-radius:14px;
            box-shadow:0 4px 0 rgba(0,0,0,.35), inset 0 0 0 2px rgba(0,0,0,.25);
            padding:10px 14px;
        }
        .title-tag{
            font-weight:900; letter-spacing:1px;
            color:#fff; text-transform:uppercase;
            text-shadow:2px 2px 0 #000;
            line-height:1;
        }
        .hp-shell{
            width:230px; height:22px; margin-top:8px;
            background:#1a120c; border:3px solid var(--paper);
            border-radius:12px; overflow:hidden;
            box-shadow:inset 0 2px 4px rgba(0,0,0,.6);
        }
        #player-health{
            width:100%; height:100%;
            background:linear-gradient(180deg,#ffc46a,#e8721e);
            transition:width .18s ease, background .2s;
        }
        .stat-row{ display:flex; align-items:center; gap:8px; }
        .chip{
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(255,255,255,.08);
            border:2px solid rgba(255,255,255,.5);
            border-radius:999px; padding:3px 11px;
            color:#fff; font-weight:800; font-size:14px;
            text-shadow:1px 1px 0 #000;
        }
        .chip b{ color:var(--hud-gold); }
        .weapon-chip{ border-color:var(--hud-gold); }
        .weapon-chip .wlabel{ color:var(--hud-gold); }

        /* number shield badge on the player panel */
        .panel{ position:relative; }
        #player-panel{ padding-right:54px; }
        .num-shield{
            position:absolute; top:8px; right:10px;
            width:40px; height:46px;
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:900; font-size:20px;
            text-shadow:2px 2px 0 #14366e;
            background:radial-gradient(circle at 50% 30%, #4a8be8, var(--hud-blue) 70%);
            border:3px solid #fff;
            border-radius:10px 10px 50% 50% / 10px 10px 60% 60%;
            box-shadow:0 3px 0 rgba(0,0,0,.4);
        }
        #pause-btn{
            position:fixed; top:14px; left:50%; transform:translateX(-50%);
            width:46px; height:46px; border-radius:50%;
            background:rgba(28,20,14,.85); border:3px solid var(--paper);
            cursor:pointer; pointer-events:auto; z-index:30;
            display:none; align-items:center; justify-content:center;
            box-shadow:0 4px 0 rgba(0,0,0,.35);
            transition:transform .08s, box-shadow .08s, filter .08s;
        }
        #pause-btn.show{ display:flex; }
        #pause-btn:hover{ filter:brightness(1.15); }
        #pause-btn:active{ transform:translateX(-50%) translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.35); }
        #pause-btn::before{
            content:""; width:14px; height:16px;
            border-left:5px solid #fff; border-right:5px solid #fff;
            box-sizing:border-box;
        }

        /* compact HUD on phones so panels fit */
        @media (max-width:560px){
            #ui-layer{ padding:8px; }
            .panel{ padding:6px 9px; border-width:2px; border-radius:11px; }
            .title-tag{ font-size:0.92rem !important; letter-spacing:.3px; }
            .hp-shell{ width:150px; height:15px; margin-top:5px; border-width:2px; }
            .chip{ font-size:11px; padding:2px 8px; gap:4px; border-width:2px; }
            .stat-row{ gap:5px; margin-top:5px !important; }
        }

        #message-overlay{
            position:absolute; top:42%; left:50%;
            transform:translate(-50%,-50%) rotate(-4deg);
            font-size:clamp(2.4rem,9vw,5rem); font-weight:900;
            color:#fff; letter-spacing:2px;
            text-shadow:4px 4px 0 #000, -2px -2px 0 #000, 0 0 24px var(--hud-orange);
            text-align:center; opacity:0; transition:opacity .4s;
            z-index:50; pointer-events:none;
        }
        #combo-pop{
            position:absolute; left:50%; top:30%;
            transform:translate(-50%,-50%) scale(0);
            color:var(--hud-gold); font-weight:900;
            font-size:clamp(1.4rem,5vw,2.4rem);
            text-shadow:3px 3px 0 #000; pointer-events:none;
            z-index:40; opacity:0;
        }

        #restart-btn{
            position:absolute; top:58%; left:50%;
            transform:translate(-50%,-50%);
            background:var(--hud-blue);
            border:4px solid #fff; color:#fff;
            font-weight:900; font-size:1.4rem; letter-spacing:1px;
            padding:14px 34px; border-radius:999px;
            box-shadow:0 6px 0 #14366e; cursor:pointer;
            pointer-events:auto; z-index:60;
            transition:transform .08s, box-shadow .08s;
        }
        #restart-btn:active{ transform:translate(-50%,-50%) translateY(4px); box-shadow:0 2px 0 #14366e; }

        /* ---------- TUTORIAL HINT ---------- */
        #hint{
            position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
            background:rgba(28,20,14,.85); border:2px solid var(--hud-gold);
            color:#fff; font-weight:700; font-size:13px;
            padding:7px 16px; border-radius:999px;
            text-shadow:1px 1px 0 #000; z-index:30;
            transition:opacity .5s; text-align:center;
        }

        /* ---------- LOADING ---------- */
        #loader{
            position:absolute; inset:0; z-index:200;
            background:#1a120c; color:#fff;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:18px; font-weight:800; letter-spacing:1px;
        }
        .spin{
            width:54px; height:54px; border-radius:50%;
            border:6px solid rgba(255,255,255,.15);
            border-top-color:var(--hud-orange);
            animation:sp 1s linear infinite;
        }
        @keyframes sp{ to{ transform:rotate(360deg);} }

        /* ---------- MOBILE CONTROLS ---------- */
        #mobile-controls{ display:none; }
        /* Safe-area-aware bottom inset so iOS Safari's home indicator bar doesn't
           swallow the joystick / action buttons in portrait. */
        :root{ --sab: env(safe-area-inset-bottom, 0px); }
        .joy-base{
            position:absolute; bottom:calc(26px + var(--sab)); left:24px;
            width:140px; height:140px; border-radius:50%;
            background:rgba(255,255,255,.12);
            border:3px solid rgba(255,255,255,.55);
            pointer-events:auto; touch-action:none;
        }
        .joy-knob{
            position:absolute; left:50%; top:50%;
            width:62px; height:62px; border-radius:50%;
            transform:translate(-50%,-50%);
            background:rgba(255,255,255,.32);
            border:3px solid #fff; pointer-events:none;
        }
        .act-cluster{
            position:absolute; bottom:calc(30px + var(--sab)); right:22px;
            display:flex; flex-direction:column; gap:14px; align-items:center;
            pointer-events:none;
        }
        .abtn{
            width:92px; height:92px; border-radius:50%;
            background:rgba(232,114,30,.85); border:4px solid #fff;
            color:#fff; font-weight:900; font-size:1rem; letter-spacing:1px;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 5px 0 rgba(0,0,0,.4);
            pointer-events:auto; touch-action:none;
        }
        .abtn:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.4); }
        .rotbtn{
            width:54px; height:54px; border-radius:50%;
            background:rgba(47,111,214,.85); border:3px solid #fff;
            color:#fff; font-size:1.4rem; font-weight:900;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 0 rgba(0,0,0,.4);
            pointer-events:auto; touch-action:none;
        }
        .rot-cluster{
            position:absolute; bottom:calc(130px + var(--sab)); right:30px;
            display:flex; gap:12px; pointer-events:none;
        }
        @media (max-width:900px), (pointer:coarse){
            #mobile-controls{ display:block; }
            #hint{ bottom:calc(185px + var(--sab)); }
            /* Phone portrait: shrink controls a touch and move dev button up so it
               doesn't sit on top of the joystick. */
            #dev-btn{ bottom:calc(180px + var(--sab)) !important; left:8px !important; }
        }
        /* Narrow portrait (most phones): tighter sizes, action cluster pulled in
           from the edge so THROW/HIT don't clip on rounded screen corners. */
        @media (max-width:560px) and (orientation:portrait){
            .joy-base{ width:120px; height:120px; left:16px;
                       bottom:calc(20px + var(--sab)); }
            .joy-knob{ width:54px; height:54px; }
            .abtn{ width:78px; height:78px; font-size:.9rem; }
            .act-cluster{ right:14px; gap:10px;
                          bottom:calc(20px + var(--sab)); }
            /* Hide rotate buttons on narrow portrait — they collide with
               THROW/HIT, and rotation isn't needed for phone play. Re-enabled
               at larger breakpoints (tablet/landscape). */
            .rot-cluster{ display:none !important; }

            /* Top HUD: shrink panels so they don't eat half the screen. */
            #player-panel{ padding:6px 8px 6px 8px !important; }
            #player-panel .title-tag{ font-size:.95rem !important; }
            #player-panel .num-shield{ width:30px !important; height:34px !important;
                                       font-size:14px !important; top:4px !important; right:4px !important; }
            #player-panel .hp-shell{ width:150px !important; height:14px !important; margin-top:4px !important; }
            #player-panel .chip{ font-size:11px !important; padding:1px 7px !important; }
            #player-panel #ult-wrap{ width:160px !important; height:9px !important; }
            #player-panel #ult-label{ font-size:7px !important; }

            /* Objective banner: move below the top HUD instead of overlapping it,
               and shrink + wrap so it doesn't ride on top of the minimap. */
            .agb-obj{ top:auto !important; bottom:calc(180px + var(--sab)) !important;
                      max-width:88vw; font-size:11px !important;
                      padding:5px 10px !important; }
            .agb-obj .obj-bar{ width:50px !important; }

            /* Minimap: smaller and tucked into a corner that won't fight the
               objective banner or the action cluster. */
            #agb-minimap{ width:78px !important; height:78px !important;
                          right:8px !important; top:106px !important; }

            /* Level-up card: stack the picks vertically so all three fit on a
               narrow screen instead of clipping off the right edge. */
            .agb-card{ padding:18px 16px !important; min-width:0 !important; max-width:92vw !important; }
            .agb-card h1{ font-size:24px !important; }
            .agb-card h2{ font-size:16px !important; margin-bottom:6px !important; }
            .agb-grid{ grid-template-columns:1fr !important; gap:8px !important; }
            .agb-pick{ padding:8px !important; }
            .agb-pick .pname{ font-size:12px !important; }
            .agb-pick .pdesc{ font-size:10px !important; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spin"></div>
        <div>LOADING THE BLOCK…</div>
    </div>

    <div id="ui-layer">
        <!-- top row -->
        <div class="flex justify-between items-start gap-3" style="pointer-events:none;">
            <div class="panel" id="player-panel">
                <div class="num-shield">11</div>
                <div class="title-tag" style="font-size:1.5rem;">No. 11 — Away Fan</div>
                <div class="hp-shell"><div id="player-health"></div></div>
                <div class="stat-row" style="margin-top:8px;">
                    <span class="chip weapon-chip"><span class="wlabel" id="weapon-display">Belt</span></span>
                    <span class="chip">HP <b id="hp-num">100</b></span>
                </div>
                <div id="ult-wrap" style="margin-top:6px; width:240px; height:12px; background:rgba(0,0,0,.55); border:2px solid #1a1108; border-radius:6px; overflow:hidden; position:relative; box-shadow:0 0 0 transparent;">
                    <div id="ult-bar" style="width:0%; height:100%; background:linear-gradient(180deg,#ffe8a8,#ff8a3d); transition:width .12s linear; position:relative;">
                        <div id="ult-sheen"></div>
                    </div>
                    <div id="ult-flame"></div>
                    <div id="ult-label" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:900; color:#1a1108; letter-spacing:1px; text-shadow:0 1px 0 rgba(255,255,255,.4);">RAGE</div>
                </div>
                <div id="combo-counter" style="margin-top:6px; font-size:14px; font-weight:900; color:var(--hud-gold); text-shadow:1px 1px 0 #000; opacity:0;">×1 COMBO</div>
            </div>
            <div class="panel" style="text-align:right;">
                <div class="title-tag" style="font-size:1.1rem;color:var(--hud-gold);">Endless Metro</div>
                <div class="stat-row" style="justify-content:flex-end;margin-top:8px;">
                    <span class="chip">Defeated <b id="score">0</b></span>
                </div>
                <div class="stat-row" style="justify-content:flex-end;margin-top:6px;">
                    <span class="chip" style="font-size:12px;">Wave <b id="wave">1</b></span>
                    <span class="chip" style="font-size:12px;">Best <b id="best">0</b></span>
                </div>
            </div>
        </div>

        <!-- center -->
        <div style="position:relative; flex:1;">
            <div id="combo-pop"></div>
            <div id="message-overlay">KNOCKED OUT!</div>
            <button id="restart-btn" class="hidden">RUN IT BACK</button>
        </div>

        <!-- bottom hint -->
        <div id="hint">WASD move · J / Space LIGHT · K HEAVY · T THROW · L DODGE · ; BLOCK · R ULTIMATE · Q/E rotate</div>
    </div>

    <!-- on-screen pause button (shown once a run begins) -->
    <div id="pause-btn" title="Pause (Esc)"></div>

    <!-- Hawks boss healthbar (shown only during a boss fight) -->
    <div id="agb-boss-hp">
        <div class="agb-boss-name">🦅 HAWKS MASCOT</div>
        <div class="agb-boss-track"><div id="agb-boss-hp-fill"></div></div>
    </div>

    <!-- Mobile -->
    <div id="mobile-controls">
        <div class="joy-base" id="joy-base"><div class="joy-knob" id="joy-knob"></div></div>
        <div class="rot-cluster">
            <div class="rotbtn" id="btn-q">↺</div>
            <div class="rotbtn" id="btn-e">↻</div>
        </div>
        <div class="act-cluster">
            <div class="abtn" id="btn-throw">THROW</div>
            <div class="abtn" id="btn-space">HIT</div>
        </div>
    </div>
    <script>
    // ============================================================
    //  STREET SWEEPER BRAWLER
    //  Sprite-based isometric brawler (Three.js r128)
    // ============================================================

    // ---- On-screen error overlay ----
    // On mobile Safari there's no devtools available to a typical player, so
    // when something throws during init we currently get a silent gray screen.
    // Catch every uncaught error and unhandled promise rejection, then paint a
    // visible overlay with the message + first frame of the stack. Anyone
    // hitting a problem can screenshot this instead of describing "it's gray".
    (function installErrorOverlay(){
        function show(msg){
            try{
                let o = document.getElementById('agb-fatal');
                if(!o){
                    o = document.createElement('div');
                    o.id = 'agb-fatal';
                    o.style.cssText = 'position:fixed;left:0;right:0;top:0;z-index:99999;background:#7a1a00;color:#fff8e1;font:600 12px/1.4 ui-monospace,monospace;padding:14px 18px;max-height:55vh;overflow:auto;white-space:pre-wrap;border-bottom:4px solid #ffd24a;box-shadow:0 6px 18px rgba(0,0,0,.5);';
                    document.body.appendChild(o);
                }
                o.textContent = (o.textContent ? o.textContent + '\n──────────\n' : '') + msg;
            }catch(_){}
        }
        window.addEventListener('error', e => {
            show('ERROR: ' + (e.message||'?') + '\n' + (e.error && e.error.stack ? e.error.stack.split('\n').slice(0,4).join('\n') : '(no stack)'));
        });
        window.addEventListener('unhandledrejection', e => {
            const r = e.reason || {};
            show('PROMISE REJECTED: ' + (r.message || r.toString ? r.toString() : '?'));
        });
    })();

    // ---- SPRITE ATLAS DATA (base64, injected) ----
    const SPRITE_DATA = {"blue": "away_game_brawler_files/blue.png", "red": "away_game_brawler_files/red.png", "black": "away_game_brawler_files/black.png", "hero": "away_game_brawler_files/hero.png", "hawks": "away_game_brawler_files/hawks.png", "knicks": "away_game_brawler_files/knicks.png"};
    const GAME_VERSION = "v1.0.1";
    // Bumped on atlas-format changes so cached browsers (iPad Safari especially)
    // refetch the new PNGs instead of mixing new code with stale image dimensions.
    const ASSET_VER = "5";
    const _asset = (url) => url.includes('?') ? url : url + '?v=' + ASSET_VER;

    // Sheet layouts. Each sheet: 8 rows = 8 facing directions (clockwise from South).
    // Basketball enemies: 20 cols => idle(0-3) run(4-7) attack(8-11) hurt(12-15) death(16-19)
    // Hero atlas (core 16 + weapons 8 + throw 4 = 28 cols):
    //   idle(0-3) run(4-7) hurt(8-11) death(12-15) belt(16-19) broom(20-23) throw(24-27)
    // CELL halved from 256 → 128 so atlases stay ≤4096 px in every dimension
    // (older iPad GPUs have a 4096 MAX_TEXTURE_SIZE; bigger atlases get silently
    // downscaled or crash the tab). NearestFilter rendering looks identical.
    const CELL = 128, ROWS = 8;
    const ENEMY_ANIMS = {
        idle:   { col:0,  len:4, fps:6,  loop:true  },
        run:    { col:4,  len:4, fps:12, loop:true  },
        attack: { col:8,  len:4, fps:9,  loop:false },
        hurt:   { col:12, len:4, fps:14, loop:false },
        death:  { col:16, len:4, fps:10, loop:false },
    };
    // mul: per-anim sprite size compensation. Hero attack cells draw the figure
    // smaller within the cell to leave room for the swing arc, which read on-screen
    // as the hero shrinking mid-attack. A small upscale brings them back to idle size.
    const HERO_ANIMS = {
        idle:   { col:0,  len:4, fps:6,  loop:true  },
        run:    { col:4,  len:4, fps:12, loop:true  },
        hurt:   { col:8,  len:4, fps:14, loop:false },
        death:  { col:12, len:4, fps:10, loop:false },
        belt:   { col:16, len:4, fps:10, loop:false, mul:1.18 },
        broom:  { col:20, len:4, fps:9,  loop:false, mul:1.18 },
        throw:  { col:24, len:4, fps:11, loop:false, mul:1.18 },

    };
    // Hawks mascot boss: 24 cols. attack = bazooka, attack2 = t-shirt cannon.
    const BOSS_ANIMS = {
        idle:    { col:0,  len:4, fps:6,  loop:true  },
        run:     { col:4,  len:4, fps:10, loop:true  },
        attack:  { col:8,  len:4, fps:10, loop:false },
        hurt:    { col:12, len:4, fps:14, loop:false },
        death:   { col:16, len:4, fps:8,  loop:false },
        attack2: { col:20, len:4, fps:10, loop:false },
    };

    // Direction order in the sheets (rows top->bottom), measured from the art:
    // 0:S  1:SE  2:E  3:NE  4:N  5:NW  6:W  7:SW   (clockwise)
    const DIR_ANGLES = [0, 1, 2, 3, 4, 5, 6, 7].map(i => i * Math.PI / 4); // radians, where 0 = South

    // ---- TEXTURE CACHE: a separate THREE.Texture per atlas, plus per-sheet col count ----
    const TEX = {};   // name -> { texture, cols, rows }

    // Auto-trim pass: source atlases sometimes draw figures at varying Y offsets
    // within their cells, causing body parts to cross into adjacent rows ("bleed").
    // We scan each cell, find the visible content's alpha bbox, then redraw it
    // centered + fitted inside the cell. Side benefit: figures sized to fill.
    // ALPHA threshold for "this pixel counts as content"
    const TRIM_ALPHA = 24;
    // skip trimming if the bbox is < this fraction of the cell — likely scrap
    // pixels from a neighboring figure that bled in.
    const TRIM_MIN_FRAC = 0.18;
    // padding inside the cell so the trimmed figure doesn't kiss the cell edges.
    const TRIM_PAD = 4;
    // Some mobile Safari builds (older iPads especially) cap canvas dimensions
    // at 4096 px. Our combiner already chroma-keys + trims at build time, so the
    // runtime pass is just a safety net for hand-dropped atlases. Skip it when
    // the image would force a too-big working canvas — the raw atlas is fine.
    const MAX_TRIM_DIM = 4096;
    function autoTrimAtlas(img, cols, rows){
        if(img.naturalWidth > MAX_TRIM_DIM || img.naturalHeight > MAX_TRIM_DIM){
            return null; // signal "use the raw image as-is"
        }
        const cw = Math.floor(img.naturalWidth / cols);
        const ch = Math.floor(img.naturalHeight / rows);
        // read source
        const src = document.createElement('canvas');
        src.width = img.naturalWidth; src.height = img.naturalHeight;
        const sctx = src.getContext('2d', { willReadFrequently: true });
        sctx.imageSmoothingEnabled = false;
        sctx.drawImage(img, 0, 0);
        // output canvas — same size, fully transparent to start
        const out = document.createElement('canvas');
        out.width = src.width; out.height = src.height;
        const octx = out.getContext('2d');
        octx.imageSmoothingEnabled = false;
        const cellMin = (cw * ch) * TRIM_MIN_FRAC;
        for(let r=0; r<rows; r++){
            for(let c=0; c<cols; c++){
                const x0 = c*cw, y0 = r*ch;
                let data;
                try { data = sctx.getImageData(x0, y0, cw, ch); }
                catch(e){ /* canvas tainted (CORS) — skip trim, fall through */ return null; }
                const px = data.data;
                let minX=cw, minY=ch, maxX=-1, maxY=-1;
                for(let y=0; y<ch; y++){
                    for(let x=0; x<cw; x++){
                        const a = px[(y*cw+x)*4 + 3];
                        if(a >= TRIM_ALPHA){
                            if(x<minX) minX=x; if(x>maxX) maxX=x;
                            if(y<minY) minY=y; if(y>maxY) maxY=y;
                        }
                    }
                }
                if(maxX<0) continue;                        // empty cell
                const bw = maxX-minX+1, bh = maxY-minY+1;
                if(bw*bh < cellMin) continue;               // too small — likely cross-cell scrap
                // scale to fit cell minus padding, centered, preserve aspect
                const availW = cw - TRIM_PAD*2;
                const availH = ch - TRIM_PAD*2;
                const sFit = Math.min(availW / bw, availH / bh);
                // never UPSCALE more than 1.0 — that would warp art that already fit fine.
                const s = Math.min(1.0, sFit);
                const dw = bw * s, dh = bh * s;
                const dx = x0 + (cw - dw)/2;
                // keep "feet anchored" — align bottom of bbox to bottom of cell minus pad.
                const dy = y0 + (ch - TRIM_PAD - dh);
                octx.drawImage(src, x0+minX, y0+minY, bw, bh, dx, dy, dw, dh);
            }
        }
        return out;
    }
    function _loadAtlasOnce(name, url, timeoutMs){
        return new Promise((res) => {
            const img = new Image();
            // crossOrigin matters for canvas getImageData inside autoTrimAtlas.
            // GH Pages serves same-origin so this is a no-op there but is needed
            // if the page is ever served from a different host than the assets.
            img.crossOrigin = 'anonymous';
            let done = false;
            const finish = (ok) => {
                if(done) return; done = true;
                if(ok){
                    const cols = Math.max(1, Math.round(img.naturalWidth / CELL));
                    const rows = Math.max(1, Math.round(img.naturalHeight / CELL));
                    const trimmed = autoTrimAtlas(img, cols, rows);
                    const source = trimmed || img;
                    const tex = new THREE.Texture(source);
                    tex.magFilter = THREE.NearestFilter;
                    tex.minFilter = THREE.NearestFilter;
                    tex.generateMipmaps = false;
                    tex.needsUpdate = true;
                    TEX[name] = { texture: tex, cols, rows };
                }
                res(ok);
            };
            img.onload  = () => finish(img.naturalWidth > 0);
            img.onerror = () => finish(false);
            setTimeout(() => finish(false), timeoutMs);
            img.src = url;
        });
    }
    async function loadAtlas(name, url){
        // First try with a generous 30s timeout; if that fails (flaky mobile
        // network, slow first paint), retry once with 45s and a cache-bust on
        // the URL so Safari doesn't replay the same failed request.
        let ok = await _loadAtlasOnce(name, url, 30000);
        if(!ok){
            const retryUrl = url + (url.includes('?') ? '&' : '?') + 'r=' + Date.now();
            ok = await _loadAtlasOnce(name, retryUrl, 45000);
        }
        return ok;
    }

    // ---- COLLISION ----
    function checkCollision(x,z,radius){
        for(const [,chunk] of STATE.activeChunks){
            if(!chunk.colliders) continue;
            for(const b of chunk.colliders){
                if(x+radius>b.minX && x-radius<b.maxX && z+radius>b.minZ && z-radius<b.maxZ) return true;
            }
        }
        return false;
    }

    // ---- ENTITY-vs-ENTITY COLLISION ----
    // Soft body separation so characters don't walk through each other. Heavier
    // bodies (player, boss) get pushed less. Runs each frame after movement.
    function entityMass(e){
        if(e.isBoss) return 6;
        if(e===STATE.player) return 3;
        if(e.isCaptain) return 2.2;
        return 1;
    }
    function entityRadius(e){ return 0.82 * (e._baseSpriteMul || 1); }
    function moveSeparated(e, mx, mz){
        if(!checkCollision(e.mesh.position.x+mx, e.mesh.position.z, 0.45)) e.mesh.position.x += mx;
        if(!checkCollision(e.mesh.position.x, e.mesh.position.z+mz, 0.45)) e.mesh.position.z += mz;
    }
    function separateEntities(){
        const list = STATE.entities.filter(e => e.state==='alive' && !e.airborne);
        for(let i=0;i<list.length;i++){
            const a=list[i]; const ra=entityRadius(a); const ma=entityMass(a);
            for(let j=i+1;j<list.length;j++){
                const b=list[j];
                const minD = ra + entityRadius(b);
                let dx=b.mesh.position.x-a.mesh.position.x, dz=b.mesh.position.z-a.mesh.position.z;
                let d2=dx*dx+dz*dz;
                if(d2 >= minD*minD) continue;
                if(d2 < 1e-6){ dx=Math.random()-0.5; dz=Math.random()-0.5; d2=dx*dx+dz*dz; }
                const d=Math.sqrt(d2);
                const overlap=minD-d, nx=dx/d, nz=dz/d;
                const mb=entityMass(b), total=ma+mb;
                const pushA=overlap*(mb/total), pushB=overlap*(ma/total);
                moveSeparated(a, -nx*pushA, -nz*pushA);
                moveSeparated(b,  nx*pushB,  nz*pushB);
            }
        }
        // ---- UNSTICK: if any entity ended up inside a building collider
        // (separation push, knockback, late-loaded chunk, spawn-edge case),
        // find the nearest free spot and teleport them there. Without this,
        // an enemy stuck inside a wall has no movement direction that
        // checkCollision will allow, and they freeze for the rest of the run.
        for(const e of list){
            unstickFromColliders(e);
        }
    }
    // Search outward in expanding rings for the closest spot the entity fits in.
    // Returns true if it had to move them, false if they were already free.
    //
    // Strategy: first try to push DIRECTLY away from the nearest collider's centre
    // (perpendicular eject — escapes thick walls in one hop). If that fails, fall
    // back to a much larger 24-direction × up-to-30-unit sweep so deeply embedded
    // entities (e.g. boss spawned inside an island's interior) get freed.
    function findNearestCollider(px, pz){
        let best = null, bestD = Infinity;
        for(const [,chunk] of STATE.activeChunks){
            if(!chunk.colliders) continue;
            for(const b of chunk.colliders){
                const cx = (b.minX+b.maxX)*0.5, cz = (b.minZ+b.maxZ)*0.5;
                const dx = px-cx, dz = pz-cz;
                const d2 = dx*dx+dz*dz;
                if(d2 < bestD){ bestD = d2; best = {b, cx, cz}; }
            }
        }
        return best;
    }
    function unstickFromColliders(e){
        const r = entityRadius(e);
        let px = e.mesh.position.x, pz = e.mesh.position.z;
        if(!checkCollision(px, pz, r)) return false;
        // ---- pass 1: eject along the normal from the nearest collider's centre.
        const near = findNearestCollider(px, pz);
        if(near){
            let nx = px - near.cx, nz = pz - near.cz;
            const nL = Math.hypot(nx, nz);
            if(nL > 1e-3){
                nx /= nL; nz /= nL;
                // walk outward 0.5 → 12 units along the normal
                for(let d = 0.5; d <= 12; d += 0.5){
                    const tx = px + nx*d, tz = pz + nz*d;
                    if(!checkCollision(tx, tz, r)){
                        e.mesh.position.x = tx;
                        e.mesh.position.z = tz;
                        return true;
                    }
                }
            }
        }
        // ---- pass 2: 24-direction spiral, ring distances up to 30 units.
        const DIRS = 24;
        for(let step=1; step<=60; step++){
            const dist = step * 0.5;
            for(let k=0; k<DIRS; k++){
                const ang = (k / DIRS) * Math.PI * 2;
                const tx = px + Math.cos(ang)*dist;
                const tz = pz + Math.sin(ang)*dist;
                if(!checkCollision(tx, tz, r)){
                    e.mesh.position.x = tx;
                    e.mesh.position.z = tz;
                    return true;
                }
            }
        }
        return false;
    }

    // ---- CAMERA OCCLUSION FADE ----
    // Each frame, fade out any building whose base box sits between the camera
    // and the player so the player is always visible. Throttled to every 3rd
    // frame (raycasts are the per-frame hotspot).
    const _ray = new THREE.Raycaster();
    const _fadeRayVec = new THREE.Vector3();
    let _fadeFrame=0;
    let _fadeMeshesCache = null;
    let _fadeChunkRev = -1;
    function updateBuildingFade(){
        if(!STATE.player) return;
        _fadeFrame++;
        if((_fadeFrame % 3) !== 0) return;   // run every 3rd frame
        const tgt = STATE.player.mesh.position;
        const camPos = camera.position;
        _fadeRayVec.set(tgt.x-camPos.x, (tgt.y+1.8)-camPos.y, tgt.z-camPos.z);
        const dist = _fadeRayVec.length();
        if(dist<0.01) return;
        _fadeRayVec.multiplyScalar(1/dist);
        _ray.set(camPos, _fadeRayVec);
        _ray.far = Math.max(0, dist - 1.0);
        // Rebuild the candidate mesh list only when active chunks change.
        const rev = STATE.activeChunks.size + '_' + STATE.wave;
        if(rev !== _fadeChunkRev){
            _fadeMeshesCache = [];
            for(const [,c] of STATE.activeChunks){
                if(!c.buildings) continue;
                for(const b of c.buildings){
                    if(b.userData.baseMesh) _fadeMeshesCache.push(b.userData.baseMesh);
                }
            }
            _fadeChunkRev = rev;
        }
        const hits = _ray.intersectObjects(_fadeMeshesCache, false);
        const now = new Set();
        for(const h of hits){
            const grp = h.object.parent;
            if(grp && grp.userData.isBuilding) now.add(grp);
        }
        // Fade new occluders in.
        for(const g of now){
            if(!STATE.fadedBuildings.has(g)){
                g.traverse(o=>{
                    if(!o.material) return;
                    if(!o.userData._origStored){
                        o.userData._origStored=true;
                        o.userData._origOpacity=o.material.opacity;
                        o.userData._origTransparent=o.material.transparent;
                        o.userData._origDepthWrite=o.material.depthWrite;
                    }
                    o.material.transparent=true;
                    o.material.depthWrite=false;
                    o.material.opacity = (o.userData._origOpacity||1) * 0.18;
                });
                STATE.fadedBuildings.add(g);
            }
        }
        // Restore any no-longer-occluding buildings.
        for(const g of [...STATE.fadedBuildings]){
            // also drop entries whose chunk got unloaded
            let n=g, alive=false; while(n){ if(n===scene){ alive=true; break; } n=n.parent; }
            if(!alive || !now.has(g)){
                g.traverse(o=>{
                    if(!o.material) return;
                    if(o.userData._origStored){
                        o.material.opacity = o.userData._origOpacity;
                        o.material.transparent = o.userData._origTransparent;
                        o.material.depthWrite = o.userData._origDepthWrite;
                        o.userData._origStored=false;
                    }
                });
                STATE.fadedBuildings.delete(g);
            }
        }
    }

    const SFX = { ready:false, master:null, vol:0.45 };
    function initAudio(){
        if(SFX.ready || !window.Tone) return;
        try{
            SFX.master = new Tone.Gain(SFX.vol).toDestination();
            SFX.punch = new Tone.MembraneSynth({pitchDecay:0.012,octaves:4,envelope:{attack:0.001,decay:0.16,sustain:0,release:0.08}}).connect(SFX.master);
            SFX.swoosh = new Tone.NoiseSynth({noise:{type:'pink'},envelope:{attack:0.002,decay:0.08,sustain:0,release:0.05}}).connect(SFX.master);
            SFX.hit = new Tone.MetalSynth({frequency:140,envelope:{attack:0.001,decay:0.18,release:0.1},harmonicity:3.5,modulationIndex:18,resonance:1800,octaves:1.2}).connect(SFX.master);
            SFX.ult = new Tone.PolySynth(Tone.FMSynth).connect(SFX.master); SFX.ult.volume.value=-6;
            SFX.parry = new Tone.MetalSynth({frequency:520,envelope:{attack:0.001,decay:0.22,release:0.18},harmonicity:5,modulationIndex:32,resonance:2600,octaves:1.0}).connect(SFX.master);
            // ambient city pad — quiet, lowpassed
            const pad = new Tone.PolySynth(Tone.AMSynth);
            const lp = new Tone.Filter(420,'lowpass').connect(SFX.master);
            pad.connect(lp); pad.volume.value=-22;
            SFX.pad = pad;
            // schedule slow ambient chord
            const cycle = ()=>{
                if(!SFX.ready) return;
                const chords=[['C2','G2','D#3'],['A1','E2','C3'],['F1','C2','G2']];
                const c=chords[Math.floor(Math.random()*chords.length)];
                pad.triggerAttackRelease(c,'4n');
                setTimeout(cycle, 4500+Math.random()*2500);
            };
            setTimeout(cycle, 1200);
            SFX.ready=true;
        } catch(e){ /* audio not available */ }
    }

    function playSfx(name){
        if(!SFX.ready) return;

            switch(name){
                case 'light':  SFX.punch.triggerAttackRelease('A2','16n'); break;
                case 'heavy':  SFX.punch.triggerAttackRelease('C2','8n');  break;
                case 'finisher': SFX.punch.triggerAttackRelease('F1','4n'); SFX.hit.triggerAttackRelease('C3','8n'); break;
                case 'swoosh': SFX.swoosh.triggerAttackRelease('16n');     break;
                case 'hit':    SFX.hit.triggerAttackRelease('C4','16n');   break;
                case 'parry':  SFX.parry.triggerAttackRelease('A4','8n');  break;
                case 'block':  SFX.hit.triggerAttackRelease('A2','32n');   break;
                case 'dodge':  SFX.swoosh.triggerAttackRelease('32n');     break;
                case 'ult':    SFX.ult.triggerAttackRelease(['C3','G3','C4'],'2n');
                               setTimeout(()=>SFX.ult.triggerAttackRelease(['G3','D4','G4'],'2n'),180); break;
                case 'ko':     SFX.punch.triggerAttackRelease('E1','2n');  break;
            }
        } catch(e){}
    }

    // ---- TEAM HOSTILITY ----
    // player and ally count as the same side (friendly fire off between them);
    // enemy is hostile to both. Same-team is always friendly.
    function isHostile(a,b){
        if(!a || !b || a===b) return false;
        if(a.team===b.team) return false;
        if((a.team==='player'&&b.team==='ally') || (a.team==='ally'&&b.team==='player')) return false;
        return true;
    }

    function spawnDamageNumber(x,y,z,value,flavor){

        const big = flavor==='big' || flavor==='crit';

                       : flavor==='crit' ? '#ff8a3d'
                       : big ? '#ffd24a' : '#fff8e1';
        ctx.fillText(tx,80,48);
        const tex=new THREE.CanvasTexture(c); tex.needsUpdate=true;
        const m=new THREE.Mesh(new THREE.PlaneGeometry(big?2.6:1.7, big?1.6:1.05),

        scene.add(m); STATE.fx.push(m);

    }

    // Cached canvas icons for the walk / don't-walk pedestrian signal.
    const _pedIconCache = {};
    function pedIcon(kind){  // 'walk' or 'hand'
        if(_pedIconCache[kind]) return _pedIconCache[kind];
        const c=document.createElement('canvas'); c.width=c.height=64;
        const x=c.getContext('2d');
        x.clearRect(0,0,64,64);
        if(kind==='walk'){
            // simple white walking-person glyph
            x.fillStyle='#ffffff';
            // head
            x.beginPath(); x.arc(30,12,5,0,Math.PI*2); x.fill();
            // torso
            x.fillRect(26,18,9,18);
            // front leg
            x.beginPath(); x.moveTo(35,36); x.lineTo(48,58); x.lineTo(42,58); x.lineTo(31,40); x.closePath(); x.fill();
            // back leg
            x.beginPath(); x.moveTo(26,36); x.lineTo(20,58); x.lineTo(14,58); x.lineTo(22,36); x.closePath(); x.fill();
            // front arm
            x.beginPath(); x.moveTo(34,20); x.lineTo(48,30); x.lineTo(46,34); x.lineTo(32,24); x.closePath(); x.fill();
        } else {
            // red upraised hand
            x.fillStyle='#ff3838';
            // palm
            x.fillRect(20,18,24,28);
            // fingers (4)
            for(let i=0;i<4;i++) x.fillRect(20+i*6,8,4,12);
            // thumb
            x.fillRect(13,22,7,16);
            // wrist
            x.fillRect(22,46,20,8);
        }
        const t=new THREE.CanvasTexture(c); t.needsUpdate=true; t.magFilter=THREE.NearestFilter; t.minFilter=THREE.LinearFilter;
        _pedIconCache[kind]=t; return t;
    }
